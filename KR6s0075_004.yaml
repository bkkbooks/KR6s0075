body:
  text: 明匡廬逸叟憨山釋德清注大宗師莊子著書自謂言有宗事有君蓋言有所主非漫談也其篇分內外者以其所學乃內聖外王之道謂得此大道於心則內為聖人迫不得已而應世則外為帝為王乃有體有用之學非空言也且內七篇乃相因之次第其逍遙遊乃明全體之聖人所謂大而化之之謂聖乃一書之宗本立言之主意也次齊物論蓋言舉世古今之人未明大道之原各以己見為是故互相是非首以儒墨相排皆未悟大道特以所師一偏之曲學以為必是固執而不化皆迷其真宰而妄執我見為是故古今舉世未有大覺之人卒莫能正之此悲世之迷而不解皆執我見之過也次養生主謂世人迷却真宰妄執血肉之軀為我人人只知為一己之謀所求功名利祿以養其形戕賊其真宰而不悟此舉世古今之迷皆不知所養耳若能養其生之主則超然脫其物欲之害乃可不虛生矣果能知養生之生則天真可復道體可全此得聖人之體也次人間世乃涉世之學問謂世事不可以有心要為不是輕易可涉若有心要名干譽恃才妄作未有不傷生戕性者若顏子葉公皆不安命不自知而強行者也必若聖人忘己虛心以遊世迫不得已而應乃免患耳其涉世之難委曲畢見能涉世無患乃聖人之大用也次德充符以明聖人忘形釋智體用兩全無心於世而與道遊乃德充之符也其大宗師總上六義道全德渾然大化忘己忘功忘名其所以稱至人神人聖人者必若此乃可為萬世之所宗而師之者故稱之曰大宗師是為全體之大聖意謂內聖之學必至此為極則所謂得其體也若迫不得已而應世則可為聖帝明王矣故次以應帝王以終內篇之意至若外篇皆蔓衍發揮內篇之意耳知天之所為知人之所為者至矣知天知人之知乃指真知謂妙悟也天乃天然大道即萬物之所宗者所為謂天地萬物乃大道全體之變故曰天之所為蓋天然無為而曲成萬物非有心也人之所為謂人稟大道乃萬物之一數特最靈者以賦大道之全體而為人之性以主其形即所謂真宰者故人之見聞知覺皆真宰以主之日用頭頭無非大道之妙用是知人即天也苟知天人合德乃知之至也知天之所為者天而生也知大道在人稟而有生者也知人之所為者以其知之所知養其知之所不知終其天年而不中道夭者是知之盛也所知者在人日用見聞覺知之知也所不知謂妙性本有人迷不覺故日用而不知由其不知雖有故但知貪欲以養形而不知釋智遺形以養性故舉世昏迷於物欲戕生傷性不能盡性全生以終其天年人者苟能於日用之間去貪離欲即境明心回光返照以復其性是以其知之所知養其知之所不知如此妙悟乃知之盛也雖然有患夫知有所待而後當其所待者特未定也雖然有患者意謂我說以所知養所不知此還有病在何也以世人一向妄知皆恃其妄知強不知以為知未悟以為悟妄為肆志則返傷其性必待真悟真知然後為恰當第恐所待而悟者未必真悟則恃為己悟則未可定也必若真真悟透天人合德本來無二乃可為真知庸詎知吾所謂天之非人乎所謂人之非天乎且有真人而後有真知意謂我說以人養天不是離人日用之外別有妙道蓋天即人也人即天也直在悟得本來無二原無缺苟真知天人一體方稱為真人矣此一節乃一篇立言之主意以一知字為眼目古人所云知之一字衆妙之門知之一字衆禍之門蓋妙悟後方是真知有真知者乃稱真人即可宗而師之也然知天知人即衆妙之門也雖然有患即知之一字衆禍之門也謂強不知以為知恃強知而妄作則返以知為害矣此舉世聰明之通病也何謂真人此下喚起真人以示真人之所養者深逈與常人不同也古之真人不逆寡寡謂薄德無智之愚人不逆者不拒也不雄成雄自恃也成謂己為全德也不恃己德以慠世也不謨士謨即謀士即事謂無心於事虛己以遊全不以事干懷也若然者真人如此處世過而弗悔當而不自得也若然者登高不栗入水不濡入火不熱是知能登假於道也言真人無心以遊世此全無得失利害之心以情不附物故水火不能傷此則遺物全性是知則能登遐於道也若此真人即世忘世之如此古之真人其𥨊不夢夢發於妄想以真人情不附物則妄想不生故𥨊無夢其覺無憂真人虛懷遊世了無得失之心故覺無憂其食不甘以道自娛故不甘於味其息深深深者綿綿之意息粗而淺則心浮動真人心泰定而不為物動故其息深深真人之息以踵此釋上深深之意踵者腳跟也以喻息之所自發處深不可測故心定而不亂衆人之息以喉衆人之息在喉則粗淺之至故心浮而妄動所以日用心馳於物而不知返屈服者其嗌言若哇心浮則言躁言不由中則易屈服嗌者咽㗋也哇吐也以淺粗之言自咽而吐無根之言也其嗜欲深者其天機淺言世人粗淺如此者乃嗜欲之深汩昏真性全不知有天然妙性皆墮妄知無真知也此一節言真人妙悟自性是為真知者故所養逈與世不同而以衆人觀之則自別矣前云有患正恐未悟而恃妄知為得者害之甚也故此雙明之古之真人不知悅生不知惡死前略言真人處世忘利害此則言真人不但忘利害而且超死生以與大道冥一悟其生本不生故生而不悅悟其死本不死故不惡其死其出不欣其入不距出入即生死二字老子云出生入死由不悅生故不貪生欣猶貪也不惡死故不距距謂爪而不肻入也翛然而往翛然而來而已矣翛然乃鶴冲舉刷羽之聲也言真人無心遊世翛然冲舉出入死生如遊太虛了無𦊱礙故云如此而已矣不忘其所始不求其所終以悟其生本不生故不忘其所始以生與道遊不見有世可出混萬物而為一故不求所終受而喜之忘而復之衆人以生為纍故患而不喜真人載道而生故受形而喜雖處人世心不違道相忘於世故念念而復是之謂不以心捐道不以人助天是之謂真人心與道遊故不捐道捐棄也人即是天不假造作修為故不以人助天如此乃謂之真人此一節言真人遊世不但忘利害而且忘死生故雖身寄人間心超物表意非真知妙悟未易至此欲人知其所養也若然者其心志其容寂其顙䪻若然者言真人如此遊世其容貌與衆不同其心志志筆乘作忘言無心於世也其容寂言容貌寂然乃內湛而外定也其顙䪻䪻寬裕也謂其貌廣大寬容不拘拘之狀也此老子云孔德之容唯道是從也凄然似秋言其面嚴冷若秋氣之肅也暖然似春言近之則其中溫然暖然令人可親可愛也喜怒通乎四時與物有宜而莫知其極言無心於喜怒但隨物所感或喜或怒了無一定於中故曰通乎四時與物有宜而人不知無喜怒也故曰莫知其極聖人之用兵也亡國而不失人心利澤施乎萬世不為愛人言聖人無心御世與天施合德假而用兵即亡人之國而不失人心本無殺伐之心也縱恩施萬世原非有意愛人也所謂天生天殺之意也故樂通物非聖人也有心要通於物非自然矣有親非仁也大仁不仁親者有心私愛非大仁也故曰賊莫大德有心天時非賢也揣度時勢非任命也利害不通非君子也明哲保身乃稱君子不通利害率意狂為非君子也行名失已非士也僞行虛名而無實則非士矣亡身不真非役人也亡己為人則人皆聽役若執己殉名則見役於物非役人者也若狐不偕務光伯夷叔齊箕子胥餘紀他申徒狄是役人之役適人之適而不自適其適者也此數子者皆知之不真狥名喪實去聖遠矣此一節槩言所知不真不能忘己忘名有心要譽狥名喪實皆非真知之聖也下又言真人真知之不同古之真人此下一節明真人遊世之狀其狀義無可不可而不朋中心和而不流若不足虗之至也而不承若一物無所受與乎與世容與其觚而不堅也觚者方也雖介然不群而非堅執不化者張乎施為也其虗而不華也雖見施為而中心空空不以華美為尚邴邴乎邴喜貌其似喜乎雖喜而無心於喜也崔乎言折節謙下也其不得已乎雖謙下以接人其實以不得已而泛應也滀乎滀渟滀如水之湛滀也進我色也謂中心湛滀而和氣日見於顏面之間與乎與之相處止我德也人與相處而不忍去厲乎其似世乎厲謂嚴整而不可犯亦似世之莊重也謷乎其未可制也謷謂謷然禮法之外似不可以禮法拘制也連乎其似好閉也連者𭣣攝撿束之意雖𭣣攝撿束但似好閉其實無所閉藏也悗乎忘其言也悗俯下之意謂對人謙下若忘其言者以刑為體刑者不留其私謂中心一私不留以為其體以禮為翼雖忘禮法猶假禮以輔翼可行於世以知為時真知時之可否以行止也以德為循言以德但為循順機宜也以刑為體者綽乎其殺也綽者有餘之義謂殺盡私欲一私不留而尤損之也以禮為翼者所以行世也言既遊世不可出於禮法之外也以知為時者不得已於事也言迫不得已而後應也以德為循者言其與有足者至於丘也丘高處也言循順機宜接引愚蒙令有識者皆可上進於道故喻如有足者皆可引進於高處也此四句釋上刑禮知德四句而人真以為勤行者也老子云用之不勤勤勞也言真人遊行於世無心而遊雖行而不勞也此一節形容真人虛心遊世之狀貌如此之妙言雖超世而未嘗越世雖同人而不群於人此真知之實也故其好之也一其弗好之也一故者由上遊世之工夫純一故得天人合德也好之者天也弗好者人也今皆一矣是謂之天人合德其一也一其不一也一其一謂天人合一謂天與人合一而歸於道則萬物雜然而不一者盡皆渾然會歸於道也其一與天為徒既人合其天則人天一則人可與天為徒也其不一與人為徒謂天人原不一也今人既合天而未免遊於人世則以天而遊故與人為徒天與人不相勝也此之謂真人若超然絶俗則是以天勝人若逐物亡性則是以人勝天今天人合德兩不相傷故不相勝必如此方是真人此一節總結前知天知人工夫做到渾然一體天人一際然後任其天真則在天而天在人而人天地同根萬物一體故天與人兩不相勝必如此真知妙悟渾化之極乃可名為真人此豈可強知妄見而可比擬哉此真人真學之全功故下章從死生命也起至藏舟章末皆極口勉人學道要做真實工夫死生命也此下教人做了死生之工夫命謂自然而不可免者其有夜旦之常天也人有死生如時之夜旦不可免者且陰陽有夜旦太虛恆一而無昏曉喻人形雖有生死而真性常然不變如太虛之無變故曰天也人之有所不得與去聲皆物之情也謂真性在人天然自具一毫人力不能與其間此人人同有之真體所謂真宰天君是也此須養而後知彼特以天為父言人人皆稟真性而有形天然自足故曰以天為父而身猶愛之而況其卓乎言此血肉之假身賴世之父而有生且養身全孝以尊父况天君載我之形卓然不屬形骸者豈不知所養而尊之乎人特以有君為愈乎已而身猶死之而況其真乎且以世人知有君欲盡忠者而以身死之况真君宰我之形而不能忘形以事之忠之可謂不智之甚矣此言激切之至人讀此而不悟非夫也此言真性在我而不屬生死者乃真常之性也而人迷之而不悟嗜欲傷之而不知所養豈非至愚也哉泉涸魚相與處於陸相煦以濕相濡以沫不如相忘於江湖老子云失道而後德失德而後仁失仁而後義此取魚失水如失道德而後仁義且以仁義相尚正似相濡以濕沫不若相忘於江湖以喻必忘仁義而可遊於大道之鄉也與其譽堯而非桀也不若兩忘而化其道無譽無非則善惡兩忘而與道為一乃真知之盛也夫大塊天地也載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也言人生天地勞佚死生皆自然而不可卻者命也此所謂人也苟知命之所係即道之在是知由人而即天也若知天與人本無二致則渾然合道而不以人害天虛心遊世以終其天年生不忘道故云善吾生者乃所以善吾死此其天人合德死生無變任造物之自然此知之至也此言世人不知大道而以仁義為至故以仁愛親以死事君此雖善不善故如泉涸而魚以濕沫相煦濡也若能渾然悟其大道則萬物一體善惡兩忘故如魚之相忘於江湖如此乃可謂知天知人天人合德而能超乎生死之外故在生在死無不善之者也夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也藏天真於有形如藏舟於壑藏有形於天地如藏山於澤謂之固矣此常人以此為定見也然造化密移雖天地亦為之變而常人不覺如有力者負之而趍昧者不知也藏小大有宜猶有所遁形與天地雖小大有宜宜皆不免於變若夫藏天下於天下而不得所遁是恆物之大情也若知此身與天地萬物皆與道為一渾然大化而不分是藏無形於無形如此則無遁則如藏天下於天下而不得所遁矣此天地萬物之實際也故曰恆物之大情特犯人之形而猶喜之若人之形者萬化而未始有極也其為樂可勝計耶言大化造物千變萬化而人特萬物之一數耳而人不知特以得人身為喜如此則萬物皆有可喜者其樂可勝計耶故聖人將遊於物之所不得遁而皆存善夭善老善始善終人猶效之言聖人心與道遊則超然生死乃物所不得遁如此則物物無非道之所在故天壽始終無所不善者而人猶效之又況萬物之所係而一化之所待乎言大道之原乃萬物之根宗故云所係萬物非此而不能融貫而為一故云一化之所待此實天地萬物之大宗聖人之所宗而師之者此也可不悟乎此發明大道無形而為天地萬物之根本人人稟此無形之大道而有生是為真宰若悟此大道則看破天地萬物身心世界消融混合而為一體若悟徹此理則稱之曰大宗師是所謂大而化之謂聖者也至此則無己無功無名逍遙於萬物之上超脫於生死之途以世人槩不知此大道之妙而以小知小見之自是不得逍遙各執己是互相是非故喪其有生之主而要求名利於世間故德不充符是則前五篇所發揮者未曾說破故此篇首乃立知天知人有真知方為真人直說到此方指出一箇大宗師正是老莊立教之所宗者如此而已故此後重新單提起一道字來發揮足見立言前後一貫言雖蔓衍而意有所宗於此可見矣夫道上文說了大宗師狀貌結了前義言大宗師宗所宗者大道上云萬物所係一化所待者何乃大道也故此下發揮大道之妙以明萬物所係一化所待之義立意皆從老子天得一以清等來有情有信此言大道之體用也齊物云可形已信有情無形正指此也此從老子𥥆𥥆冥冥其中有精其精甚真其中有信此言有情謂雖虛而有實體不失其用曰信無為無形湛然常寂故無為超乎名相故無形可傳而不可受可得而不可見以心印心故可傳可受妙契忘言故無受無得自本自根本自天然原非假借未有天地自古以固存天地以之建立故先有固存神鬼神帝生天生地變化不測為天地萬物之主在太極之先而不為高伏𦏁畫卦始於太極推之向上更有事在故不以為高在六極之下而不為深包天地容六合故不為深先天地生而不為久以固存故不為久長於上古而不為老萬化密移而此道湛然故不老豨韋古帝王名得之以挈天地參贊化育整理世界伏羲軒黃也得之以襲氣母襲取也氣母生物之本也襲氣母即老子求食於母維斗北斗天之樞也得之終古不忒忒差也北斗天樞居所不動故不差忒日月得之終古不息運行而不已用行而不殆堪壞崑崙之神人面獸形得之以襲崑崙此襲猶承襲言主持崑崙馮夷河伯也得之以遊大川肩吾山神也得之以處太山黃帝軒轅也得之以遊雲天乘龍飛升上仙也顓頊五帝之一得之以處玄宮禺強北海之神山海經云玄者有神人面鳥形珥兩青蛇踐兩蛇名曰禺強得之立乎北極北海之極西王母瑤池仙長也得之坐乎少廣王母所居之宮也莫知其始莫知其終此二句總結上文列聖神人主持天地日月星辰皆恃大道故莫知其始終此直從老子天得一以清一章中變化如許說話彭祖姓籛古長壽之人得之上及有虞下及五伯世傳彭祖壽八百嵗故上自有虞下及五伯傅說商之賢相得之以相武丁乘東維騎箕尾而比於列星傅說一星在尾上言其乘東維騎箕尾之間也此明大宗師者所宗者大道也以大道乃天地萬物神人之主今人人稟此大道而有生處此形骸之中為生之主者所謂天然之性以形假而性真故稱之曰真宰而人悟此大道徹見性真則能外形骸直於天地造化同流混融而為一體而為世間人物之同宗者故曰大宗師者此也此大宗師即逍遙所稱神人聖人至人所言有情有信即齊物之真宰及養生篇生之主若不悟此而涉人世必有形骸之大患顏子心齊教其悟之之方既悟性真則形骸可外故德充符前一往皆敷演其古今迷悟之狀到此方分明說破一路說來方才吐露所以云言有宗事有君正此意也此上已發揮大道明白了然但未說進道工夫故此下乃說入道真實工夫南伯子葵問於女媯此人名皆重言也撰出個人來設為問答不必求其實也曰子之年長矣而色若孺子何也問其年老大而色若嬰兒借以發起必有所養將以發啓工夫也曰吾聞道矣此即要引人學道也南伯子葵曰可得學耶此因聞說聞道則驚詫其言謂道豈可學之耶曰惡惡可二字皆平聲驚歎之意上惡字歎其道難言下惡字歎其道不是容易可學要是其人乃可子非其人也言道非容易可學况子非學道之人何以見得夫卜梁倚有聖人之才才謂天賦之根器猶俗云天資也而無聖人之道言有美質而無進道志向我有聖人之道而無聖人之才言我有聖人之道而無美質故多費苦工夫吾欲以教之庶幾其果為聖人乎言我欲教卜梁倚以大道其亦可教但無志向論才亦庶幾可成苐不知可能造就而為聖人乎不然以聖人之道告聖人之才亦易矣言學道之人才德雙美者固是難得有此全質則學之亦易矣吾猶守而告之三日而後能外天下天下踈而遠故三日而可外此言教之一次也己外天下矣吾又守之七日而後能外物物漸近於身故七日而忘己外物矣吾又守之九日而後能外生生則切於己者故九日之功乃外己外生矣而後能朝徹朝平旦也徹朗徹也謂己外生則忽然朗悟如睡夢覺故曰朝徹朝徹而後能見獨獨謂悟一真之性不屬形骸故曰見獨見獨而後能無古今謂悟一真之性超乎天地故不屬古今無古今而後能入於不死不生謂了悟性真超乎天地量絶古今則見本來不死不生殺生者不死生者有形之纍也既悟性真則形骸已外物纍全消故曰殺生則一性獨存故曰不死生生者不生形化性全則與道冥一而能造化羣生而一真湛然故曰生生者不生其為物也物指不死不生之道體也無不將也謂此道體千變萬化化化無窮故無不將也將者以也無不迎也在乎人者日用頭頭左右逢元故曰無不迎也無不毀也謂此道體陶鎔萬化挫鋭解紛故曰無不毀無不成也觸處現成不假安排其名為攖寧攖者塵勞雜亂困橫拂鬱橈動其心曰攖言學道之人全從逆順境界中做出只到一切境界不動其心寧定湛然故曰攖寧攖寧也者攖而後成者也此釋攖寧之意謂從刻苦境界中做出故曰攖而後成者也此前論大道雖是可宗可師猶漫言無要此一節方指出學道之方意謂此道雖是人人本有既無生知之聖必要學而後成今要學者須要根器全美方堪授受授受之際又非草率須要耳提面命守而教之其教之之方又不可速成須有漸次而入故使漸漸開悟其三日外天下七日外物九日外生死而後見獨朝徹此悟之之效也既悟此道則一切處日用頭頭觸處現成縱橫無礙雖在塵勞之中其心泰定常寧天君泰然湛然不動工夫到此名曰攖寧何謂攖寧蓋從雜亂境緣中做出故曰攖而後成者也觀此老言雖蔓衍其所造道工夫皆從刻苦中做來非苟然也今人讀其言者豈可槩以文字視之哉上言入道工夫下言聞道蓋亦從文字中悟來故以重言發之南伯子葵曰子獨惡乎聞之此問聞道之原曰女媯答聞諸副墨之子副墨文字也言始從文中來副墨之子聞之洛誦之孫洛誦言包洛而誦習也意謂誦習文字久而自得也洛誦之孫聞之瞻明瞻明言見有明處乃因文字有悟處也瞻明聞之聶許聶許謂從耳聞聲入心通而心自許也聶許聞之需役需待也役使也言心雖有悟必待驗之行事之間一切處現前不昧與道相應然後造妙也需役聞之於謳於謳涵泳吟咏之意於謳聞之玄冥由涵泳謳吟而有冥會於心乃造道之極也玄冥聞之參寥參寥者空廓廣大虗無之境謂道之實際也參寥聞之疑始言入於無始乃歸極於此學道之成也此一節言聖人得此大道不無所聞蓋從文字語言中有所發明以至動用周旋謳吟咳唾之間以合於玄冥參於寥廓以極於無始至不可知之地必如此深造實證而後已如此殆非口耳而可得也是乃可稱大宗師前來發明大道可宗悟此大道者可稱宗師但未見其果有其人否耶恐世人不信將謂虛談故向下撰出子祀等乃實是得道之人以作證據子祀子輿子犁子來四人相語曰孰能以無為首以生為脊以死為尻尾也孰知死生存亡為一體者吾與之友矣意謂從無形而遍有形而人之此身皆道之所化故以無為首者從無有生也脊者身也尻者尾也謂生之終也言誰能知此無生之生者則可相與為友矣四人相視而笑莫逆於心遂相與為友言心同道合遂為友也子輿有病子祀往問之曰偉哉夫造物者以子為此拘拘也此子輿自歎造物有力壯哉能使我於大化之中將以子為此拘拘之形也曲僂發背此下子輿言其病狀謂形已傴僂殘廢且又㿈瘡上有五管言形傴僂則五臟之管向上也隱於齊言形曲則兩限隱於齊下也肩高於頂限則兩肩聳高於頂句贅指天句贅頂髻也言隱而項縮故髻指天也陰陽之氣有沴沴凌亂言不和也言雖從大化受形以陰陽之氣凌亂不和故使我形骸如此之殘廢不堪也其心閒而無事言以形廢而心轉無事此足見其能以道自適不以形為纍也跰𨇤而鑑於井跰𨇤扶曳也謂恐自知不明又鑑於井則視身如影矣曰嗟乎夫造物者又將以子為此拘拘也因鑑於井自見其狀乃嘆曰夫造物者既拘拘為我此形矣而又復使我如此殘廢之惡狀耶子祀曰汝惡之乎子祀因見子輿之嘆乃問之曰子惡此形耶曰亡子何惡亡絶也子輿意謂我心不但絶然無惡而方與之俱化也浸假而化豫之左臂以為雞豫因以求時夜浸假造化也言從無形造化之中漸漸而適於有形即化子之左臂以為雞豫因之而求時夜時夜言雞報曉也浸假而化子之右臂以為彈子因以求梟炙若化子之右臂為彈子即因之而求梟炙言以彈擊梟以充炙也浸假而化子之尻以為輪以神為馬豫因而乘之豈更駕哉此言有道之士既視此身如㿈瘡而不足觀且又視之如影而不可執是則不但無纍而且與之俱化故又能借假修真因此而求有實用是則此身雖為異物若果能化之則形神俱妙真人乘此以遊人世豈更駕哉且夫得者時也失者順也安時而處順哀樂不能入也此古之所謂縣解也言真人忘形適真形神俱妙不以得失干心安時處順無往而不自得故哀樂不能入如此是古之所謂縣解者也言生纍如倒縣超乎死生則倒縣解矣故云縣解而不能自解者物有以結之人人本皆如此無纍超然懸解而人不能解之者乃自我以結之也且夫物不勝天久矣吾又何惡焉言人任造化而遷故人不能勝天既不能勝則任之而已又何惡焉此一節言真人真知形本無形今既適有形則為生纍故真人視之如㿈瘡而不可愛如影而不可執如此則但任造化之所適了無得失之心故死生無變於己所以安時處順哀樂不入此所謂縣解者也如此看來人人本來天然解脫但人自苦於形纍而卒莫能自解者非天之過乃人自結之耳且夫天人之際本來人不勝天吾於此看破久矣雖有此假形吾有真用又何惡焉此其所以為真人是可宗而師之者也俄而子來有疾喘喘焉死將上言四人為友而子輿之妙已知之矣今又發子來二人之妙喘氣喘急而將絶也其妻子環而泣之犁往而問之曰叱避無怛化叱避言呵斥其妻子使避之也怛猶驚也此言真人與造化遊非婦人小子所知故叱使無驚之也倚其尸而與之語曰偉哉造化又將奚以汝為將奚以汝適言不知造化又將汝作何物也以汝為鼠肝乎鼠肝極細以汝為蟲臂乎蟲臂不堅子來曰父母於子東西南北唯命之從陰陽於人不翅止也於父母彼近吾死而我不聽我則悍違戾也矣彼指造物何罪焉言造物亦非有心要死我也故曰何罪夫大塊天地也載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也言造化既全我一生我任造化而遊是為善生既任化而生則不貪生故謂善生然死亦從化是為善死吾又何釋焉夫大冶鑄金金踴躍曰我且必為鏌鎁神劍名大冶必以為不祥之金今一犯偶然觸之曰一犯人之形言在萬化之中偶然觸犯而為人之形而曰人耳人耳夫造物者必以為不祥之人言萬物不可勝數而自獨以人為善是不知造化者乃不祥之人也今一以天地為大爐以造化為大冶惡乎往而不可哉言天地萬物俱在造化鈞陶之中何物而非載道成形何往而非道之所在如此又何往而不可哉成然𥧌蘧然覺言死生夢覺故死但如𥧌生如覺夜旦夢覺而已又何必取捨欣厭哉此一節言真人所得殊非婦人小子之所知故子犁叱避以形容其必有真知然後為真人必若子來之順化而遊死生無變無生可戀無死可拒要學人必造到如此超然獨得之妙純一無疵方為學問能事之究竟處是可稱為大宗師矣上言真人能順死生不知從何致此故下以子桑戶三入發明乃方外了道之人所能此假學問非方內曲士所知子桑戶孟子反子琴張三人相與友曰孰能相與於無相與無相與言大道無形之鄉相為於無相為言大道寂莫無為之境孰能登天遊霧撓挑無極言超然世外遊於萬物之表相忘以生雖生而不見其有生無所終窮言心與道遊於無始無終即此便見真人遊世之若此三人相視而笑莫逆於心言道合心同忘形相與遂相與友唯真人乃知真人故三人為友莫然有間居頃之間而子桑戶死未葬孔子聞之使子貢往待事焉夫子使子貢往弔以待葬事將盡禮也或編曲或鼓琴相和而歌曰嗟來桑戶乎嗟來桑戶乎而汝也已返其真而我猶為人猗猗者歎辭也言汝幸已返其真而我尚且為人可歎也子貢趨而進曰敢問臨尸而歌禮乎子貢執禮言臨尸當哭不當歌也二人相視而笑曰是指子貢惡知禮意言禮之意重在返本謂子貢不知此也子貢返以告孔子曰彼何人者耶修行無有言不撿於禮不能飾行故曰修行無有而外其形骸不以死生為事臨尸而歌顏色不變全無哀戚之容無以命之命名也不知喚他作何等人物彼何人者耶言畢竟是何等人耶孔子曰彼遊方之外者也言彼超脫凡情遊於世外者也而丘遊方之內者也言未能超脫世綱故云遊方內外內不相及言彼方外之人以世俗之禮加之則非所宜言不當弔也而丘使女往弔之丘則陋矣言我本不當使女往弔此誠我之鄙陋見也彼方且與造物者為人相者猶助也言造物本無形彼以為人之形乃助造物之生意耳而遊乎天地之一氣言彼雖處人世其實心遊乎未有天地已前與大道混茫而為一也彼以生為附贅懸疣贅疣乃山中之人項上之癭瘤以喻形乃道之贅疣餘物也以死為決疣潰癕彼視身如贅疣為癕疽以為生之大患今幸而死則如疣癕之决潰方為大快活事又何以死為哀耶夫若然者又惡知死生先後之所在言彼以生為大患以脫形骸為輕舉返乎本來不生不死之鄉又何知有死生先後之所在耶假於異物以性真而借四大以成形如假托異物元非己有也託於同體言心與道遊故云托於同體忘其肝膽言以生為寄故不見有形骸故曰忘其肝膽遺其耳目言雖遊人世如不聞見故云遺其耳目返復終始不知端倪言真人遊於大化之中返復往來無所窮極又安知以生為始以死為終乎芒然倣徨乎塵垢之外逍遙乎無為之業又烏能憒憒然為世俗之禮以觀示也衆人之耳目哉言真人處世如寄以形骸為大患故忘形釋智超然物表遨遊於塵垢之外逍遙於無為寂寞之鄉又何能憒憒以世俗之禮以示衆之耳目哉借重孔子此言乃明方內夫子亦未嘗不知有方外之學也此一節言方外真人之學逍遙物外自得之妙非世俗耳目之所及故托孔子子貢發揮將以破迂儒執禮法之曲見以解憒憒之執情亦將使其自得超然之境斯正此老著書之本意也子貢曰然則夫子何方之依子貢因聞夫子說方外真人之道如此故問夫子自處何方之依孔子曰丘天之戮民也此夫子自謙言已未免生纍蓋懸之未解乃天之戮民言未能忘桎梏也雖然吾與女共之夫子言雖然我未超脫與女均之今且與女共遊於方外子貢曰敢問其方問遠舉超脫之方孔子曰魚相造乎水人相造乎道人之以道為命如魚之以水為命相造乎水者穿池而養給言養魚尚勞功用相造乎道者無事而生定言人造乎道甚易放下便是故云無事而生定故曰魚相忘於江湖人相忘於道術穿池而養魚尚難忘不若放之江湖則自然忘矣如人能造乎大道浩然大均則無不忘矣子貢曰敢問畸人子貢意謂方外之人乃獨行之君子故問畸人畸獨也謂不知獨行之人比方外何如畸人者畸於人而侔於天故曰天之小人人之君子人之君子天之小人也孔子言彼方外者亦畸人也但彼畸於人而侔合乎天若世之獨行君子矜矜自持不能逍遙自在者是乃天之小人則為人中之君子人中之君子則為天之小人苐未能與天為一耳此一節言孔子方內之聖人亦能引進於方外之學意謂世之拘拘者亦可與造乎大道故以子貢之才智尚去道遠甚况其他乎下明方外之道方內亦有能行者第俗人不識耳故借顏子發明孔子以開其迷意若顏子之好學誠可以深造而自得也顏回問仲尼曰孟孫才其母死哭泣無涕無心於哭中心不戚全無哀意居喪不哀無是三者以善喪蓋魯國以善居喪之名以蓋魯國固有無其實而得其名者乎名不副實回一怪之一謂一常怪之仲尼曰夫孟孫氏盡之言能極盡喪禮也進於知矣言世人但知世俗之禮而不知天今孟孫氏乃盡於知天故人之返本乃禮之實也唯簡之而不得夫己有所簡矣言孟孫知其本無生死又何假以哀為禮哉但世人常情必以哀為禮故欲簡之而不得故人哭亦哭乃不得已而從俗之情耳今哀而不戚則已有所簡矣孟孫氏不知所以生不知所以死言孟孫子悟不生不死之道不知就先不知就後言以了悟不生不死故雖生而如不有生故云不就先雖死而知本不死故不就後坦然大化之中若化為物言孟孫自視其形在大化之中若忽焉化為一物耳以待其所不知之化已乎言不知其所以生故今雖處形骸但待其所不知之大化聽其盡之而已乎豈有情識哉且方將化惡知不化哉言方將化惡知有不化者有焉方將不化惡知已化哉言世人但知固守其形將謂不化彼惡知造化密移而念念已化哉吾特與汝其夢未始覺者邪言化而不化乃死生一貫唯大覺方知且吾與汝皆在夢中而未覺者也且彼有駭形而無損心到此方言孟孫之母雖死而不死者存但形死耳故曰有駭形如豚子之視死母而走也若其天真之性湛然不遷所謂死而不亡故曰無損心有旦宅而無情死言其生如旦其形如宅謂假形雖化而真宰長存故曰有旦宅而無情死情實也孟孫氏特覺死而不死之理孟孫特悟於此人哭亦哭是自其所以乃孟孫已知其母不死但以世情不得不哭故其所以乃如此哭而不哀切也且也相與吾之耳矣言既知死而不死則視已死之孟母即未死之孟孫故相較之乃吾之耳相與謂一體而觀也庸詎知吾所謂吾之乎言死生一條之理若吾之之言此豈常人所能知之乎下以夢喻吾之之意且汝夢為鳥而厲乎天厲猶戾也夢為魚而沒於淵言吾之之意女未及信我且問女且女夢為鳥則飛戾于天夢為魚則沒于淵然夢中之魚鳥即不夢之顏回是乃吾之之意也不識今之言者其覺者乎其夢者乎言女方今對我言者乃不夢之顏回耶乃夢中之魚鳥耶若言是顏回則女已化為魚鳥矣若言是魚鳥不妨現是不化之顏回女試自看死生一條之理固如是耳此數語極奇最難理會造適不及笑適者稱意之極則笑亦不及獻笑不及排如人詼諧獻笑至發笑處則安排不及言死生一貫之理必須頓悟乃自知之非言可及也安排而化去乃入於寥天一寥天一乃大道寥廓冥一之天此由初心造道功夫故如安排及夫純一到大化之境自然頓悟不假作為而自證入也此一節言方外之學方內亦有能之者第在世俗之中常情所不識必有真人乃能知之故借重顏子與聖人開覺之此𫨻最是惺悟世人真切處上言了無生死乃造道之極要在頓悟下言世人必欲學道須將仁義恭矜智能夙習之事一切屏絶乃可入道意而子見許由許由曰堯何以資汝何以教汝意而子曰堯謂我汝必躬服行也仁義而明言是非許由曰而奚來為軹奚何軹助語辭言又何為來耶意謂女已被堯教壞了也夫堯既黥其鬚則毀其面貌汝以仁義言以仁義僞行壞了本來面目而劓割其鼻也汝以是非矣汝將何以遊夫遙蕩逍遙之境恣睢縱橫也轉徙變化也之途乎言汝已被堯以仁是非壞了汝本來面目而拘於仁義是非之場又何能遊於逍遙大道之鄉乎意而子曰雖然吾願遊其蕃言雖不能入大道之奧亦願遊其蕃籬許由曰不然夫盲者無以與夫眉目顏色之好瞽者無以與夫青黃黼黻之觀言汝心既盲鼓難以與大道也意而子曰夫無莊古之美貌者之失其美據梁古之有力者之失其力黃帝之忘其知言至人之善教能使人人失其平昔之所自有皆在爐錘之間耳言上三人頓失其固有是在夫子之陶鑄之中耳庸詎知夫造物者之不息我黥而補我劓使我乘成以隨先生耶言我今日幸得見先生豈非造物者補我之失乘其渾全之大道以隨先生耶許由曰噫未可知也言汝雖有志未知何如也我為汝言其大略不敢盡其底蘊試為汝言其大略吾師乎吾師乎吾師乃大宗師也非堯可比𩐎萬物而不為義澤及萬世而不為仁言堯諄諄以仁義為仁義以愛養萬物以為功吾大宗師則𩐎粉萬物而不以為義縱澤及萬世而不以為仁以大仁不仁大義不義即老子生而不有為而不恃長而不宰之意長於上古而不為老言未有天地先有此道覆載天地刻雕衆形而不為巧言大道生天生地化育萬物而無心故不有其巧此所遊已言𩐎物已下乃吾師之所遊者如此而已此一節言欲學大道必須屏絶有心要為仁義恭矜智能之事方可超玄入妙而逍遙乎大道之鄉蓋仁義智能乃功名之資世俗之所尚實為大道之障礙故耳顏回曰回益矣仲尼曰何謂也曰回忘仁義矣曰可矣猶未也言雖忘仁義則可許有入道之分然猶未也他日復見曰顏回他日又見夫子回益矣曰何謂也曰回忘禮樂矣言忘禮樂則不拘拘於世俗也曰可矣猶未也言雖忘人而同未忘己他日復見曰回益矣曰何謂也曰回坐忘矣仲尼蹴然改容也曰何謂坐忘顏回曰隳壞也支體言忘形也黜聰明泯知見也離形去知同於大通言身知俱泯物我兩忘浩然空洞內外一如曰大通此謂坐忘仲尼曰同則無好也言身世兩忘物我俱空則取捨情盡故無所好也化則無常也言物我兩忘則形神俱化化則無己則物無非己故不常執我為我也而汝也果實也其賢乎言汝功夫到此實遇於我多矣丘也請從而後也夫子自以為不若亦願為此也此一節言方內曲學之士果能自損兼忘而與道大通雖聖智亦嘗讓之意謂此等功夫非智巧可入也故前以子貢之不知今以顏子乃可入也子輿與子桑友而淋雨十日子輿曰子桑殆病矣知其絶食也褁飯而往食之至子桑之門則若歌若哭言歌之哀也鼓琴曰父耶母耶天乎人乎此鼓琴之曲也有不任其聲言餓而無力故不任其聲而趣舉其詩焉趣舉其詩言氣短促舉詩而氣不相接也子輿入曰子之歌詩何故若是言何故不成音韻也曰吾思夫使我至此極者而弗得也言且歌且思使我如此之貧至極者不可得不知其誰使也父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉求其為之者而弗可得也然而至此極者命也夫此一節總結一篇之意然此篇所論乃大宗師而結歸於命者何也乃此老之生平心事有難於言語形容者意謂己乃是有大道之人可為萬世之大宗師然生斯世也而不見知於人且以至貧極困以自處者豈天有意使我至此耶然而不見知於時者蓋命也夫即此一語涵滀無窮意思然此大宗師即逍遙遊中之至人神人聖人其不知為知即齊物之因是真知乃真宰即養生之主其篇中諸人皆德充符者總上諸意而結歸於大宗師以全內聖之學也下應帝王即外王之意也應帝王莊子之學以內聖外王為體用如前逍遙之至人神人聖人即此所謂大宗師也且云以塵垢粃糠猶能陶鑄堯舜故云道之真以治身其緒餘土苴以為天下國家所謂治天下者聖人之餘事也以前六篇發揮大道之妙而大宗師乃得道之人是聖人之全體已得乎己也有體必有用故此應帝王以顯大道之用若聖人時運將出迫不得已而應命則為聖帝明王推其緒餘則無為而化絶無有意而作為也此顯無為之大用故以名篇齧問於王倪四問而四不知此篇以無知二字作眼目此無知乃無心於世漠然而已齧因躍而大喜行以告蒲衣子蒲衣子曰而汝也乃今知之乎言汝今日乃知不知之妙乎有虞氏不及泰氏向來世人秖知有虞氏之為聖人而不知不及泰氏也有虞氏其猶藏善美也仁以要人此言有虞之不濟處蓋以仁為善故有心以仁要結人心亦得人矣而未始出於非人言有虞氏以仁要人雖亦得人且不能忘其功名但是世俗之行而未能超出人世而悟真人之道妙以造非人之境也泰氏其臥徐徐徐紆徐間閒之意其覺于于自得之妙一以己為馬一以己為牛其知情信其德甚真而未始入於非人此言泰氏超越有虞虛懷以遊世心閒而自得且物我兼忘人欺以為牛則以牛應之人呼以為馬則以馬應之未嘗堅執我見與物俱化其知則非妄知而悟其性真然情信指道體而言前云有情有信是也此其體也至其德用甚真不以人僞即已超凡情安於大道非人之境而不墮於虛無且能和光同塵而未始拘拘自隘此泰氏之妙也蓋已得大宗師之體而應用世間特推緒餘以度世故云未始入於非人肩吾見狂接輿狂接輿曰日中始何以語汝日中始乃接輿所見之人曰告我君人者以己出經常法也式程凖也義度人言人君治天下當以所出之常法為程凖以義制而度人以此乃治天下之常法孰敢不𦗟而化諸諸猶之也言人君以此治人則人孰敢不𦗟而從其化耶接輿曰是欺德也言若日中之說乃非真實之德蓋欺德耳謂人君恃己之能治而欺其人將以不敢不𦗟從也其於治天下也猶涉海鑿河而使蚊負山也言大聖治天下以不治治之但以道在宥群生使各安其性各遂其生而已若以有心強治以為功則捨道而任僞而猶越海之外鑿河則失其大而枉勞且如蚊負山必無此理也夫聖人之治也治外乎言聖人之治天下豈治外乎正而後行正即前云正生以正衆生謂使各正性命之意謂聖人但自正性命而施之百姓使各自正之老子云清淨為天下正確乎能其事者而已矣確者真確能事即孟子之良能言人各稟大道以為性命之正天然自足一毫人力不能與其間今但使人人各悟性真則恬淡無為自化矣又何假有心為之哉且鳥高飛以避矰戈之害鼷鼠深乎神丘社壇也之下以避熏鑿之患而曾二蟲之無知言鳥鼠二蟲天性自得但人心以機械而欲取之故高飛深藏而避之而人曾謂二蟲之無知乎百姓天性猶鳥鼠也人君有心欲治之能不驚而避之乎外篇馬蹄痛發明此意此上二節言治天下不可以有心恃知好為以自居其功若任無為而百姓自化老子曰我無為而民自化清淨為天下正若設法以制其民不但不從而且若鳥鼠而驚且避之也天根遊於殷陽地名至蓼水水名之上適遭遇也無名人而問焉曰請問為天下無名人曰去女鄙人也何問之不豫也豫者從容安詳之意而問之太倉卒也子方將與造物者為人言任造化而為人非有心於世也厭厭不欲也則又乘夫莾眇之鳥乃道之取譬也以出六極之外而遊無何有之鄉大道之鄉曠垠曠垠謂無際也之野又何帠為音以治天下感觸也子之心為無名責天根問之倉卒而無禮也言我雖處世但順造化而為人乘化而遊若厭而不欲為人則乘大道而遊於廣大逍遙無為之境又何以天下觸我之心而若此耶又復問天根又問必願聞其說也無名人曰無名因求教之切故告之以正汝遊心於淡謂恬淡寂寞之境合氣於漠漠冲虛也言合氣於虛順物自然不可有心恃知妄為而無容私焉會萬物以為己大公均調而無庸私焉而天下治矣必如此而天下自治此一節直示無為而化治天下之妙欲君人者取法返乎上古無為之化也陽子居見老聃曰有人假若有人於此嚮向也疾捷也謂向道敏捷也彊梁勇為也物徹事物透徹也疏明疏通明達也學道不倦如是者可比及也明王乎老聃曰是於聖人也言如此之人比於聖人者胥胥靡之罪役也易更番也技工技之人係羈係於市肆也勞形怵心者也言嚮疾彊梁之人亦似胥役之罪夫更番不暇工役之係肆勞苦形骸驚惕其心者也將此以比王自苦不暇安能治民乎且也虎豹之文來田言虎豹因皮有文故招來田獵之災猿狙之便捷也執斄音狸之狗言狗能執狸來藉藉以繩繫之也言猿狙因便捷故人得而繫之以教衣冠狗能執狸人得而繫之以充田獵如是者可比明王乎言若嚮疾之人可比明王則猿狙與執狸之狗亦可比明王矣陽子居戚然改容也曰敢問明王之治言如是之人不可比明王敢問如何是明王之治老聃曰明王之治功蓋天下而似不自己縱有功蓋天下而不自居其功化貸代者與人之意萬物萬物皆往資焉而不匱而民弗恃而民不知恃賴有莫舉名名不可得而舉稱使物自喜但使物物自遂自喜猶言帝力何有於我立乎不測不可測識而遊於無有者也不測無有通指大道之鄉也此全是老子為而不長不宰之意此一節發揮明王之治皆申明老子之意以示所宗立言之本極稱大宗師應世而為聖帝明王以行無為之化也上言明王立乎不測而遊於無有如此乃可應世以治天下但不知不測是如何境界人亦有能可學而至者乎故下撰出壺子乃不測之人所示於神巫者乃不測之境界列子見之而願學即其人也鄭有神巫曰季咸神巫乃善相者名季咸也知人之死生存亡禍福壽夭期以歲月旬日言相人最驗刻期不爽若神鄭人見之皆棄之而走言畏其靈驗恐說出不好之事故皆走不敢近也列子見之而心醉列子將以為神故心醉服也歸以告壺子此乃列子之師也曰始吾以夫子之道為至矣則又有至焉者矣意謂神巫超過壺丘子遠矣壺子曰吾與汝既其文言我之教汝者但外面皮毛耳既盡也未既其實其道之真實處全未示汝而汝也固將謂也得道歟汝將謂已得道歟衆雌而無雄而又奚焉言物有雌雄乃能生以比人有心對待而相者乃見其禍福若心能絶待又何從而相之如雌而無雄又何焉而汝也以道與世亢與人相比亢也必信夫以要人必信故相亢以示己之長故使人得而相汝以不能忘己要人知之故人亦因得而相之也嘗試與來以豫示之若來以我示之看彼能測我乎明日列子與之見壺子出而謂列子曰嘻驚歎也子之先生死矣弗活矣不以旬數矣言不十數日即死矣吾見怪焉吾見怪之見濕灰焉言面如濕灰絶無生機也列子入泣涕沾襟以聞先生必死以告壺子壺子曰嚮吾示之以地文此下三見壺子示之安心不測之境此即佛門之止觀乃安心之法也地文乃安心於至靜之地此止也萌草之未出芽曰萌乎不震動也不正猶顯示也謂我安心於至靜一念不生不動不顯之地即心念俱及泯絶故面如濕灰無生機也是殆見吾杜止也德機猶生機也也言彼殆見我止絶生機故將謂我必死也嘗又與來命明日再來看明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣言汝之先生幸遇我可以不死而疾有瘳矣全然有生矣吾見其杜絶也權活動也矣言我見其死而復活乃有生機也列子入以告壺子壺子曰嚮吾之以天壤天壤謂高明昭曠之地此即觀也名實不入言性地光明一切不存也而機發於踵踵最深深處也言自從至深靜之地而發起照用如所云即止之觀也是殆見吾善者機也言彼見吾善而不死者以我示之以天機也嘗又與來再命明日更來明日又與之見壺子出而謂列子曰子之先生不齊言精神恍惚顏色不一齊一也吾無得而相焉試齊且復相之言待精神一定而復相之也列子入以告壺子壺子曰吾嚮示之以太冲至虛之地莫勝言動靜不二也初偏於靜次偏於動今則安心於極虛動靜不二猶言止觀雙運不二之境也是殆見吾衡平也氣機也言平等持心動靜不二故氣機亦和融而不測也下壺子又講明前所示者乃三種觀法故彼莫測耳鯢鰍魚也桓盤桓言鰍魚盤於深泥也之審處也為淵淵湛淵乃止觀之名然鯢桓之所處於深泥以喻至靜即初之止也止水之審為淵此喻觀也止水澄清萬象斯鑑即次之天壤之觀也流水之審為淵流水雖動而水性湛然不動此喻即動而靜即靜而動動靜不二平等安心即末後太冲莫勝止觀不二也淵有九種言定有九種此處三焉言我示之者乃三種定法也嘗又與來明日又與之見壺子立未定自失而走壺子曰追列子追之不及返以報壺子曰已滅矣言去之已無蹤影矣已失矣言即尋之已不得見矣吾弗及矣言我追之已不及已壺子曰嚮吾示之以未始出吾宗宗者謂虛無大道之根宗安心於無有了無動靜之相即佛氏之攝三觀於一心也吾與之虛而委蛇言我安心於至虛無有之地但以虛體而示狀貌委蛇隨順彼耳不知其誰何故彼不知其誰何也因以為弚靡言物之頺靡難於𭣣拾也因以為波流言精神浩蕩捉摸不定也故逃也因此難測故逃走耳然後列子自以為未始學初則列子未得壺子之真實故以神巫為至今見壺子所以示神巫者雖善相卒莫能測識其端倪到此方信壺子之道大難測而始知自己從來未有學也而歸辭壺子而歸立志造修也三年不出專一做工夫為其妻㸑言列子初恃自己有道以驕其妻今能忘身而為妻㸑食豖如食人初未入道而有人物分別之心今則分別情忘於事無與親言無心於事也雕琢復朴先以雕琢喪朴今則還純返朴矣塊然不識不知之貌獨以其形立紛而封哉封即齊物之有封之封謂受形骸是於大化之中乃立人我橫生是非固執而不化者猶有封之疆界也而今乃知此形為紛授而封畛之也一以是終言列子竟此學以終其身也此一節因上言明王立乎不測以無為而化莊子恐世人不知不測是何等境界為何等人物故特撰出個壺子乃其人也即所示於神巫者乃不測之境界也如此等人安心如此乃可應世可稱明王方能無為而化也其他豈可倣佛哉言此假學問亦可學而至只貴信得及做得出若列子即有志信道之人也此勵世之心難以名言矣上言壺子但示其不測之境下文重發揮應世之用無為名尸尸主也言真人先要忘名故戒其不可為名尸無為謀府智謀之所聚曰謀府言一任無心不可以智謀為事也無為事任言不可強行任事謂有擔當則為纍為患但順事而應若非己出者也無為知主知主以知巧為主也言順物忘懷不可主於智巧也體盡無窮體言體會於大道應化無有窮盡也而遊無朕朕兆也謂遊於無物之初安心於一念不生之地也盡其所受乎天而無見得言但自盡其所受乎天者全體不失而亦未見有得之心也亦虛而已如此亦歸於虛而已言一毫不可有加於其間也至人之用心若鏡不將不迎應而不藏故能勝物而不傷至人用心如明鏡當臺物來順照並不將心要應事之未至亦不以心先迎即物一至妍醜分明而不留藏妍醜之跡了無是非之心如此虛心應世故能勝物而物卒莫能傷之者虛之至也已前說了真人許多情狀許多工夫末後直結歸至人已下二十二字乃盡莊子之學問功夫效驗作用盡在此而已其餘種種撰出皆蔓衍之辭也內篇之意已盡此矣學者體認亦不必多只在此數語下手則應物忘懷一生受用不盡此所謂逍遙遊也南海之帝為倏北海之帝為忽中央之帝為渾沌倏與忽時相與遇於渾沌之地渾沌待之甚善倏與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死倏忽者無而忽有言人於大化最初受形之始也渾沌言雖俄爾有形尚無情識渾然沌然無知無識之時也及情竇日鑿知識一開則天真盡喪所謂日鑿一竅七日而渾沌死也副墨以倏為火以忽為水渾沌為土似有理太犯穿鑿只如此解則已此倏忽一章不獨結應帝王一篇其實總結內七篇之大意前言逍遙則總歸大宗師前頻言小知傷生養形而忘生之主以物傷生種種不得逍遙皆知巧之過蓋都為鑿破渾沌喪失天真者即古今宇宙兩間之人自堯舜以來未有一人而不是鑿破渾沌之人也此特寓言大地皆凡夫愚迷之人槩若此耳以俗眼觀之似乎不經其實所言無一字不是救世愍迷之心也豈可以文字視之哉讀者當見其心可也即豫此解亦非牽強附合蓋就其所宗以得其立言之旨但以佛法中人天止觀而參證之所謂天乘止觀即宗鏡亦云老莊所宗自然清淨無為之道即初禪天通明禪也吾徒觀者幸無以佛法妄擬為過也音釋䪻皮變切音卞豨許豈切希上聲媯居為切音為跰𨇤跰北孟切音迸𨇤相然切音仙居宜切音羈倏式竹切音叔
