body:
  text: 明匡廬逸叟憨山釋德清註齊物論物論者乃古今人物眾口之辯論也盖言世無真知大覺之大聖而諸子各以小知小見為自是都是自執一己之我見故各以己得為必是既一人以己為是則天下人人皆非竟無一人之真是者大者則從儒墨兩家相是非下則諸子眾口各以己是而互相非則終竟無一人可正齊之者故物論之難齊也久矣皆不自明之過也今莊子意若齊物之論須是大覺真人出世忘我忘人以真知真悟了無人我之分相忘於大道如此則物論不必要齊而是非自冺了無人我是非之相此齊物之大旨也篇中立言以忘我為第一若不執我見我是必須了悟自己本有之真宰脫却肉質之假我則自然渾融於大道之鄉此乃齊物之功夫必至大而化之則物我兩忘如夢蝶之喻乃齊物之實證也篇中以三籟𤼵端者盖籟者猶言機也地籟萬籟齊鳴乃一氣之機殊音眾響而了無是非人籟比竹雖是人為曲屈而無機心故不必說若天籟乃人人說話本出於天機之妙但人多了一我見而以機心為主宰故不比地籟之風吹以此故有是非之相排若是忘機之言則無可不可何有彼此之是非哉此立言之本旨也老子云天地之間其猶橐籥乎虛而不屈動而愈出多言數窮不如守中此齊物分明是其注疏以此觀之則思過半矣南郭子綦子綦乃有道之士隱居南郭隱几而坐端居而坐忽然忘身如顏子之心齊此便是齊物論之第一工夫仰天而噓因忘身而自笑也㗳焉解體貌言不見有身也似喪其耦此言色身乃真君之耦耳今忽焉忘身故言似喪其耦顏成子游子綦之弟子立侍乎前曰何居乎言先生何所安心乃如此乎形固可使如槁木子綦既已忘形則身同槁木而心固可使如死灰乎形忘而機自息故心若死灰子游言形與心固可如槁木死灰乎今之隱几者非昔之隱几也言昔見隱几尚有生機今則如槁木死灰比昔大不相侔矣子綦曰偃子游名不亦善乎而問之也言問之甚不善也今者吾喪我吾自指真我喪我謂喪忘其血肉之軀也女知之乎言女豈知吾喪我之意乎此齊物以喪我發端要顯世人是非都是我見要齊物論必以亡我為第一義也故逍遙之聖人必先忘己而次忘功忘名此其立言之旨也女聞人籟乃簫管之吹而有聲者而未聞地籟即下文長風一鼓萬竅怒號女聞地籟而未聞天籟夫即眾人之言論乃天機之自𤼵將要齊物論而以三籟𤼵端者要人悟自己言之所出乃天機所𤼵果能忘機無心之言如風吹竅號又何是非之有哉明此三籟之設則大意可知子游曰敢問其方問三籟之所以子綦曰先說地籟夫大塊天地也噫愛去聲氣其名為風言大風乃天地之噫氣如逍遙六月之風為息此摶弄造化之意是指風惟無作起也作則萬竅怒號言大風一起則萬竅怒號而汝也獨不聞之翏翏乎翏翏長風初起之聲也山林之畏佳搖動也大木百圍之竅穴言深山大木有百圍者則全身是竅穴似鼻此下言穴之狀有似人鼻之兩孔者似口似人之口橫生者似耳似人之耳斜垂者似枅有方孔之似枅者似圈有圓孔之似圈者似臼有孔內小外大似舂臼者似洼者有長孔似有水之洼者似污者似淺孔似水之污者上言竅之形下言聲激者故有聲如水之激石者謞音孝者有似響箭之聲而謞者叱者如人叱牛之聲者吸者如人吸氣而聲細若𭣣者呌者有聲似人高呌者譹音豪者有低聲若譹者宎者如犬之細聲而留者咬者若犬吠之聲者已上竅之聲也前者前陣風也唱于聲輕而緩而隨者唱喁後陣而聲重冷風零風則小和風一吹而眾竅有聲如和飄風大風則大和厲猛也風濟止也則眾竅為虛謂眾竅之聲因風鼓𤼵大風一止則眾竅寂然言聲本無也而汝也獨不見之調調之刁刁乎調調刁刁乃草木搖動之餘也意謂風雖止而草木尚搖動而不止此暗喻世人是非之言論而唱者已亡而人人以緒論各執為是非者此長風眾竅只是箇譬喻謂從大道順造物而散於眾人如長風之鼓萬竅人各稟形器之不同故知見之不一而各𤼵論之不齊如眾竅受風之大小淺深故聲有高低大小長短之不一此眾論之所一定之不齊也故古之人唱於前者小而和於後者必盛大各隨所唱而和之猶人各稟師承之不一也前已唱者已死而後之和者猶追論之不已若風止而草木猶然搖動之不已也然天風一氣本乎自然元無機心存於其間則為無心之言聖人之所說者是也爭柰人人各執己見言出於機心不是無心故有是非故下文云夫言非吹也以明物論之不齊全出於機心我見而不自明白之過此立言之樞紐也知此可觀齊物矣子游曰地籟則眾竅是己人籟則比竹是己言已知地籟則是比竹無疑故不必更說敢問天籟子綦曰夫吹萬不同而使其自己也言天籟者乃人人𤼵言之天機也吹萬不同者意謂大道本無形聲托造物一氣散而為萬靈人各得之而為真宰者如長風一氣而吹萬竅也以人各以所稟形器之不一故各各知見之不同亦如眾竅之聲不一故曰吹萬不同使其自已者謂人人迷其真宰之一體但認血肉之軀為己身以一偏之見為己是故曰使其自己謂從自己而𤼵也此物論不齊之病根也咸其自取怒者其誰耶此一言直指齊物之功夫直造忘言之境也咸者皆也取猶言看取乃返觀內照之意也怒者鼓其𤼵言之氣乘氣而後方有言也誰者要看此言畢竟從誰而𤼵也但知言從己𤼵而不知有真宰主之若不悟真宰則其言皆是我見非載道之言由此是非之生終竟而不悟也要人識取真宰也齊物之意最先以忘我為本指今方說天籟即要人返觀言語音聲之所自𤼵畢竟是誰為主宰若悟此真宰則外離人我言本無言又何是非堅執之有哉此齊物論之下手工夫直㨗示人處只在自取怒者其誰一語此便是禪門叅究之功夫必如此看破方得此老之真實學問處殆不可以文字解之則全不得其指歸矣下文大知閒閒將此眾竅音聲作譬喻文雖不倫而意實然也大知閑閑小知間間大言炎炎小言詹詹大知謂仁義綱常為知者閑乃闌檻所以防物不踰越者也小知間間謂法度凖繩斤斤一毫不假借者與夫工商計利之人皆此類也大言炎炎謂綱常之說氣𦦨熏人使不敢犯也詹詹謂分別利害精密不漏也此天地間人所有之知唯此兩等而已此皆小知乃世俗之知耳故所言者非是天然特出於機耳故次明之其𥧌也魂交其覺也形開此𥧌覺開合盖言其機也謂𥧌時其塊交合其機閉而不𤼵覺時形開其機𤼵於見聞知覺故與境相接與接為搆日以心鬬接謂心與境接心境內外交搆𤼵生種種好惡取捨不能暫止則境與心交相鬬搆無一念之停也縵者此下形容心境交搆之心機也縵謂軟緩乃柔奸之人也窖者窖謂如掘地為穽以䧟人乃陰險之人也密者密謂心機綿密不易露也小恐惴惴惴惴恐懼貌謂假作小心狀有所畏乃小人也大恐縵縵縵縵謂寬鬆之狀乃大奸之人縱有大恐而佯為不采示不懼也其𤼵若機括其司是非之謂也機乃弩之𤼵括乃箭之括謂拿定傷人之機括其司是非乃主刁訟之人也其留如詛盟其守勝之謂也詛盟心藏其事不肯吐露如有呪誓者乃執己是不肯輸與人也故曰守勝其殺如秋冬以言其日消也此小知之人日與心鬬而機心如此之不同總之自伐真性天理日消如秋冬之殺氣絕無生機可望也其溺之所為之不可使復之也言此等機心之人沉溺於所為以為是不可使復其真性也其厭也如緘以言其老洫也厭即厭足飽滿之意言此等人機心厭滿于中至老愈深所謂老奸之人也近死之心莫使復陽也言一生用心如此至死不能復使其本明也此一節形容舉世古今之人未明大道未得無心故矜其小知以為是故其所言若仁義若是非凡所出言皆機心所𤼵人人執之至死而不悟言其人之形器雖似眾竅之不一其音聲亦似眾響之不同但彼地籟無心而人言有心故後文云言非吹也因此各封己見故有是非物論之不齊者此也所謂天地之間其猶橐籥乎中峰云三界塵勞如海闊無古無今閙聒聒謂是故也此下形容其情狀喜怒哀樂慮思慮也歎嗟嘆也變變態不常也慹憂疑不動也姚災祥也佚縱散也啟開心也態裝模樣作態度也樂出虛言其人雖不同其情狀雖不一其實自亦不知其所發如樂之出於虛即老子云虛而不屈動而愈出之意也蒸成菌言此等情狀皆非清淨心中所出乃𤼵於穢濁之氣如菌之生于糞壤故其言之不足采也日夜相代乎前而莫知其所萌言其此等之人穢濁心機𥧌形諸夢覺接其境日夜與心為𨷖相代而不已其實不自知其萌動處不知誰為之主也已乎已乎猶言且住且住我知之矣旦暮得此其所由以生乎前云怒者其誰耶今言人之機心所𤼵不知所萌今要人人識取自己主人公故云旦暮得此所由以生將一此字暗點出箇真宰乃有生之主旦暮者即死生晝夜之道也得此以生要人悟此耳非彼無我非我無所彼即上此字指真宰也謂非彼真宰則不能有我之形若非我之假形而彼真宰亦無所托取是亦近矣前云咸其自取怒者其誰今云取是是即上此彼二字意指真宰也謂人能識取此真宰亦近道矣而不知其所為使謂真宰乃天機之主其體自然而不知其所為使之者若有真宰到此方拈出真宰二字要人悟此則為真知矣而特但也不得其朕朕兆也言真宰在人身中本來無形故求之而不得其朕兆也可行言日用云為無非真宰為之用已信言信有真實之體可信而不見其形但求之而不見其形容耳此即老子云杳杳冥冥其中有精其精甚真其中有信之意有情實也而無形謂有真實之體但無形狀耳前云知之不同此一節言各人情狀之不一而人但任私情之所𤼵而不知有天真之性為之主宰因迷此真宰故任情逐物而不知返本故人之可哀者此耳前云咸其自取怒者其誰到此却𤼵露出真宰要人悟此則有真知乃不墮是非窠臼耳上言真宰雖是無形今為有形之主若要悟得須將此形骸件件看破超脫有形乃見無形之妙故下文𤼵之百骸骸骨也人有三百六十骨節總而言之曰百骸九竅耳目口鼻有七通前後有九六藏藏者心藏神肝藏魂脾藏意肺藏魄腎藏志通命門為六舉一身之形盡此數件而已賅而存焉吾誰與為親賅猶該也言該盡一身若俱存之而為我不知此中那一件是我最親者若以一件為親則餘者皆不屬我矣若件件都親則有多我畢竟其中誰為我者此即佛說小乘析色明空觀法又即圓覺經云四大各離今者妄身當在何處此破我執之第一觀也汝皆恱之乎其有私焉言汝身中件件皆恱則有私焉者則有多我矣如是皆有為臣妾乎言如是件件皆我若無真君主之者此時臣妾但供使令耳非其主也其臣妾不足以相治也若件件但供使令若臣妾者然臣妾不能相治誰為管攝耶其相為君臣乎若相為君臣則無一定之主矣其有真君存焉若件件無主乃假我耳其必有真君存焉既有真君在我而人何不自求之耶如求得其情與不得無益乎其真言此真君本來不屬形骸天然具足人若求之而得其實體在真君亦無有增益即求之而不得而真若亦無所即所謂不增不減迷之不减悟之不增乃本然之性真者此語甚正有似內教之說但彼認有箇真宰即佛所說識神是也莊子心胷廣大故其為文真似長風鼓竅不知所自立言之間舉意搆思即包括始終但言不頓彰且又筆端鼓舞故觀者茫然不知其脉絡耳如此篇初說天籟即云吹萬不同而使其自己也咸其自取怒者其誰耶則己立定脚跟要人自看識取真宰只是一言難盡故前面大知閑閑已來皆是𤼵揮吹萬不同只到旦暮得此已下方解說咸其自取怒者其誰方拈出箇真宰示人今此一節乃說破形骸是假我要人撇脫形骸方見真宰即是篇首喪我之實也向下只說世人迷真逐妄乃可哀之大者盖悲愍之意也一受其成形言真君本來無形自一受軀殼以成形不亡以待盡則不暫亡只待此形隨化而盡與物相刃相靡其行盡如馳而莫知能止不亦悲乎言真君為我有形之主而不知所養使之與接為搆日與心鬬以為血肉之軀故被外物相傷如刃之披靡往而不返可不悲乎終身役役而不見其成功言馳於物欲終身役役勞苦而竟不見其成功不知竟為何事苶然疲貌疲役而不知其所歸可不哀耶言為名利勞形終身役役以至苶然疲𡚁而竟莫知所歸宿人生之迷如此可不哀耶人謂之不死奚益世人如此昏迷之至其形雖存人謂不死有何益哉其形化其心與之然可不謂之大哀乎言其妄情馳逐而不休而形骸與之俱化而心亦與之俱溺而不悟如此可不謂之大哀乎人之生也固若是芒無知貌乎言人生固如此之無知乎其我獨芒而人亦有不芒者乎言唯我獨芒然無知耶而世人亦有不芒者乎此莊子鼓舞激切之語也此一節言真君一迷於形骸之中而為物欲之所傷火馳不返勞役而不知止終身不悟可不謂之大哀者耶由其迷之也深顛倒於是非而不覺也故下文方露出是非二字夫隨其成心現成本有之真心也而師之誰獨且無師乎言人人具有此心人皆可自求而師之也奚必知代而心自取者有之此句謂何必聖人有之盖知代者乃聖人知形骸為假借故忘形而自取於心者也愚者與有焉雖愚者亦與有焉未成乎心而有是非言人未悟本有之真心而便自立是非之說是以今日適越而昔至也言其實未至以為至以此是非者是自欺也是以無有為有所謂未得為得強不知以為知也無有為有言此自欺之人雖有神禹且不能知言神禹雖聖其知雖廣亦直知其所至之處若此等人以無為有又何能知之吾獨且柰何哉神禹且不能知吾獨且柰何哉甚言此輩難與言大道也此一節言是非之端起於自欺之人強不知以為知且執己見為必是故一切皆非盖未悟本有之真知而執妄知為是此等之人雖聖人亦無柰之何哉可惜現成真心昧之而不悟惜之甚矣由不悟真心故執己見為是則以人為非此是非之病根也下文方發明齊物論之主意夫言非吹也前但敷演世人不悟真宰但執我見以未隨其本有之真心但執妄見所以各各知見不同到此方入物論謂世人之言乃機心所𤼵非若風之吹竅也言者有言故所言者非任真宰乃有機心之言其所言者特未定也以任一己偏見之言故其所言者特未定其果是果非也其有言耶其未嘗有言耶此要人返觀本來有此言耶未嘗有此言耶即此一語便令人自知而齊物論之功夫略示於此矣其以為異於鷇音鷇音者乃鳥在殼將出啐啐之聲謂是天機之音全出無心而人之有心之言與鷇音不同要人自看取亦有辯乎亦無辯乎辯謂彼此諍辯也謂人返看語言如鷇音時此則有辯論乎無辯論乎要人𤼵言當下自返觀也此一節將明物論之不齊先指出言語音聲本無是非若任天機所𤼵則了無是非之辯然絕言處乃齊物之旨已揭示於此欲人就此做工夫看破天機則是非自冺矣從夫言非吹也起直至後文成虧章末此之謂以明止為一大章計七百四十餘言節節生意最難一貫必細心深觀乃悟其玅向下方的指出是非之人乃迷真執妄之流也道惡乎隱隱謂晦而不明也而有真偽謂大道本無真偽先設問道為何不明而有真偽耶言惡乎隱而有是非謂真人之言本無是非設問為何真言隱而有是非耶道惡乎往而不存言道若無真偽則了無取捨何往而不存耶言惡乎存而不可若言出於自然一任天機則有何所說而不可但為道隱而言亦偽言偽而是非因之而生也道隱於小成言道本不隱但隱於小知之人所成者小故大道不彰耳言隱於榮華榮華謂虛華不實之言也以言不載道故但涉浮華故至言隱矣故有儒墨之是非到此方指出是非之人盖端為儒墨而𤼵以儒厚葬墨子薄親故互相是非當時莊子與孟子同時以孟子闢楊墨曰予豈好辯哉故有是非之辯故以儒墨並之以是其所非而非其所是言儒以厚葬為是乃墨子之所非者故曰是其所非墨以薄親為是而儒非之故曰非其所是欲是其所非而非其所是則莫若以明言儒墨二家互相是非皆未明大道但各執我見耳未必為真是也苟欲是其所非而非其所是莫若明乎大道則了無是非之辯矣此一節方指出是非之端起自儒墨當時雖有處士橫議而儒墨為先唱意謂楊墨固失仁義矣而儒亦未明大道也故兩家皆無一定之真是故以此為𤼵論之張本盖言辯是非濫觴於儒墨傍及諸子後單結指於惠子皆不明之人乃喪道者也下先明本無是非而人不自知故妄執己見起是非耳物無非彼言若天地間一人執我則盡天下之人皆彼也故曰物無非彼物無非是言若一人執己為是則人人皆執己為是則天下無不是矣故曰物無非是自彼則不見言若但見彼之非則不見自己之非矣自知則知之言若自知其非則知天下無不是矣故曰自知則知之故曰彼出於是言彼之非盖出於我之是是亦因彼言我之是亦因彼之非由人不自知故但執己是所以不能冺是非也此一節言人苦於不自知故以己是為必當若彼此互相易地而觀則物我兩忘是非自冺乃見本來無是非也下文𤼵明是非本無特因對待而有彼彼非是我是方生之說也方謂比方對待之意也言是非本無盖因人我對待而有也雖然下一轉以明對待無有了期方生方死方死方生言對待是非比之生死一般生而死死而生生死循環無有了期若將死字作滅字看亦妙方可方不可方不可方可是者為可不是為不可以此終無兩可之時因是因非因非因是言此是因彼非彼是因此非皆不自知自明之過也是以聖人不由而照之於天亦因是也言聖人不由世人之是非而獨照明於天然之大道故是為真是故曰亦因是也此言聖人之因是乃照破之真是不似世人以固執我見為是而妄以人為非也此即老子之人法天此一節言世人之是非乃迷執之妄見故彼此是非而不休唯聖人不隨眾人之見乃真知獨照於天然大道了然明見其真是故曰亦因是也此是則與眾天淵故以亦字揀之前云與其儒墨互相是非莫若以明明即照破之義故此以聖人照之於天以實以明之明此為齊物之工夫謂照破即無對待故下文𤼵揮絕待之意而結歸於莫若以明是亦彼也彼亦是也此承上聖人照破工夫則悟我之是即彼之非彼之非亦即我之是如此互觀則何是非之有彼亦一是非此亦一是非如此互觀則是非兩忘果且有彼彼非是我是乎哉果且無彼是乎哉若是非兩合於大道果然有是非哉果然無是非乎哉彼是莫得其耦謂之道樞言是非兩忘則坦然一際絕諸對待如此彼是莫得其耦耦對待也絕待即道妙之樞紐也樞始得其環中以應無窮環則不方中虛則活而能應以譬道之虛無若得此虛無道樞則應變無窮是亦一無窮非亦一無窮也言是非冺同於大道則是亦是道非亦是道如莊子誹薄堯舜此一於大道也故曰莫若以明前云與其儒墨之是非莫若以明說到聖人照破則冺絕是非而與道遊則無往而非大道之所在故此結之故曰莫若以明此一節言聖人照破則了無是非自然合乎大道應變無窮而其妙處皆由一以明耳此欲人悟明乃為真是也則物論不待齊而自齊矣此即老子之天法道下以指馬喻本無是非之意以指喻指之非指以我之觸指喻彼之中指為非我之觸指不若以非指喻指之非指也不若以彼中指倒喻我之觸指又非彼之中指矣以馬喻馬之非馬馬雙陸之戲馬也馬有黑白之分雖有黑白皆馬也若以彼黑馬喻我之白馬非彼之黑馬不若以非馬喻馬之非馬也不若以彼黑馬倒喻我之白馬又非彼之黑馬矣天地一指也萬物一馬也若以此易地而觀指馬無二則是非自無由聖人照破大而觀之不但人我一己之是非自絕則天地與我並生萬物與我為一斯則天地一指萬物一馬耳又何有彼此是非之辯哉此盖從莫以明一語𤼵出聖人不由而照於天釋以明之意故此結歸照破工夫真能冺是非萬物齊一欲人於此着眼也此一節𤼵揮聖人照破則冺絕是非天地萬物化而為一下文釋為一之所以可乎可謂人以為可則我亦因而可之不可乎不可人不可則我亦因而不可之道行之而成謂任道而行無有不合於道者成現現成成不必分別也物謂之而然然者自是也謂人謂之而然者惡乎然謂所以然者何耶然於然謂然於自己心中之為然耳惡乎不然言人因何而不然耶不然於不然謂人所以不然者但彼心中自以為不然耳物固有所然言物物實有一定之然譬如藥之參喙用參則喙不然且用喙時用參則不然矣此則物物皆有一定之實然也物固有所可物有在此不可而在彼亦有可用者物無不然物無不可由此觀之則天下物無有不然亦無有不可者故為是舉莛屋梁也與楹屋柱也厲音頼癩病之惡人也與西施美婦人也恢大也恑詐也譎詭也怪怪異也道通為一言莛楹之長短厲施之美惡恢恑譎怪之變狀以人情視之其實不得其一樣難其無是非若以道眼觀之則了無長短美惡之相一際平等此言非悟大道决不能齊天下之物論也其分也成也如截大木以為器在木則為分在器則為成故其分即成也其成也毀也然器雖成於木則毀如此豈可執一定為成毀哉凡物無成與毀復通為一若就一邊而觀似有成毀若通而觀之則無成無毀故復通為一以此而觀萬物又何是非之有此釋上天地一指萬物一馬之意必以道眼觀之自然絕無是非之相是非絕則道通為一矣下文方指歸于道惟達者達道之人知通為一為是不用而寓諸庸惟達道之人知萬物本通為一故不執己是故曰不用既不用己是但寓諸眾人之情庸眾也謂隨眾人之見也庸也者用也解庸者用也謂用眾人之好惡為好惡也用也者通也由其能用故能通眾人之志也通也者得也言能通達於道者無往而不自得苟自得則無是非之執矣適得而幾矣言達道之人能適於得則幾近於道矣因是已言達者通達於一雖萬變而不失其道此則無往而不是如此因是乃真是也已而不知其然謂之道謂至無往而不達則了無是非順物忘懷則不知其所以然謂之道此老子道法自然此一節要忘是非必須達道之聖人知萬物一體故無是無非無適而不可順乎自然此謂之道上面說了許多展演鋪舒直到此方指歸一道字因是己之己字乃極盡之處言聖人極盡只是合乎自然之道如此而已合乎道則自然歸一後文言愚人強勉要一故卒莫能一也勞神明為一而不知其同也謂未違大道強勉以己見要為一而不知其本來大同也謂之朝三何謂朝三謂執己見為必是要一眾人之見即如狙之喻也曰狙公養猿之人賦芧輸芧粒以食猿也曰朝三而暮四眾狙皆怒言眾狙執定朝應多而夕應少曰然則朝四而暮三眾狙皆恱狙公以本數顛倒之名實未虧而喜怒為用亦因是也三四之名同而實數亦同但狙之所執己見以朝四為必是故不核其實而但喜其名耳此皆不能忘是非者如夷齊之類是也是以聖人和之以是非而休乎天鈞天鈞謂天然均等絕無是非之地也前云照之以天故此結云休止乎天均是之謂兩行兩行者謂是者可行而非者亦可行但以道均調則是非無不可者此一節言工夫未到自然之地強勉要一其是非而不悟玄同之妙者似此之人但能因是不能忘非正如夷齊介子之流其行雖高不無憤世疾俗之心又如儒墨各執一端為是乃但能可其可不能可其不可雖然離是非卒不能一是非即其所操未嘗不是元非道外只以各執己見為是乃成顛倒故如狙公之七數名實一般而喜怒為用各別此特勞神明為一者而不知其大同者也須是聖人和同是非休乎天均兩忘而俱行之故能和光同塵混融而不辯則無可不可矣下文意謂古之人知到本來無物玄同之境故本無是非自後漸漸不濟矣古之人其知有所至矣上言不知道者勞神明強一而竟莫能一故此言古之真人有真知之至處至者本來無物之地也故下徵釋惡乎至問何以為至有以為未始有物者至矣盡矣不可以復加矣本來無物已前乃道之極處無以知也其次以為有物矣而未始有封也其次雖適有形猶知識未鑿似渾沌初分人心純樸然尚未有人我之封之封猶彼此界限也其次以為有封焉而未始有是非也其次雖有彼此界限其風尚樸素而未有是非之心去道不遠是非之彰也道之所以虧也自是非一彰而大道喪矣道之所以虧愛之所以成愛私愛於一己也成前云一受其成形自迷真性成此形骸固執為我故大道虧多矣果且有成與虧乎哉果且無成與虧乎哉苟以大道而觀果且有成虧乎無成虧乎若真見得本無成虧則是非自冺矣此一節言由迷大道則成我形我成而道虧矣前云一受其成形不亡以待盡直說到此處方透出一箇愛字為我執之本以成其一己之我則所成者小而大道隱矣申明前云道隱於小成之意也後文意由所成者小故舉世之人終身役役而不見其成功故以三子𤼵之有成與虧故故字副墨作昔字昭氏之鼓琴也由上云愛成而道虧又要顯本無成虧故引三子𤼵之昭文善鼓琴是成一家之業後其子不能鼓琴是虧了家聲也無成與虧昭氏之不鼓琴也意謂當初不勇成鼓琴之名則其子亦未有虧家聲之說昭文之鼓琴師曠之枝䇿也又引師曠作証言師曠最聰明之人却使眼盲不見枝䇿而行此便是有成虧處惠子之據梧也惠子與莊子同時為友而惠子有口才善辯論莊子意謂惠子辯論雖成而大道已虧故以二子成虧比之以善辯而不明道即如師曠聰明而眼盲即其子亦不能世其辯論之業故如昭文之鼓琴三子之知幾乎皆其盛者也故載之末年言從事以終其身也惟其好之也以異於彼言三子之篤好將以異乎人也其好之也欲以明之彼言他人又有好三子之知者而三子自以為至又欲以己之能將明示之於彼謂教他人也非所明而明之故以堅白之昧終此句意獨指惠子本未明道而強自以為明而又明之於他人故無大成竟以堅白昧之以終其身而其子又以文之綸終上句惠子之成虧此言昭文之成虧終身無成言惠子以堅白之昧終此終身無成也昭文之子學父之琴亦終身無成若惠子之不辯昭文之不鼓琴又何成虧之有哉言其道之所以虧者正以成者小耳若是而可謂成乎雖我亦成也言若惠子之可謂成者莊子言如此則我之不成可謂之成也若是而不可謂成乎物與我無成也若是而不可謂成則人與我皆未是成者也是故滑疑之耀聖人之所圖也滑疑之耀者乃韜晦和光即老子昏昏悶悶之意謂和光同塵不衒己見之意言光而不耀乃聖人所圖也為是不用而寓諸庸此之謂以明言聖人不以知見誇示於人亦不以己見為必是故不用其是而但寓於庸眾之中前所謂以明者乃是大成者此也此一節結文來意甚遠從夫言非吹也起而下及道惡乎隱而有真偽以道隱於小成言隱於榮華乃至欲是其所非而非其所是莫若以明論起一層以至樞始得其環中則結之曰莫若以明為第二層次從指馬喻論起以明道通為一引出惟達者知通為一為是不用而寓諸庸乃點出一道字以作活眼次借狙公名實未虧從一虧上𤼵揮道之所以虧由愛之所以成以此愛之所以成一句又遠結前立義中一受其成形及隨其成心而師之兩成字之意謂若受其成形即愛之所以成故道有所虧此有成有虧也若隨其成心而師之則本無成虧因有成形故有辯論是非之彰盖由此耳是以成形成心二意作骨子也此道隱小成言隱榮華有自來矣皆未悟明大道之過也故先揭示之曰莫若以明次又論道樞則又云故曰莫若以明今論到底結歸成虧指出惠子是第一不明之人故持堅白之辯昧了一生故末後指出滑疑之耀之聖人乃不自是之人故繳歸為是不用而寓諸庸之達者乃結之曰此之謂莫若以明其文𤼵自夫言非吹也起至此約七百餘言方一大結其文與意若草裏蛇但見其動蕩遊衍莫覩其形跡非具正眼者未易窺也至若三子之成虧其昭文乃業之有成虧者師曠乃形之有成虧者惠子則道之有成虧者總結道隱於小成言隱於榮華而末結歸於聖人此聖人即結前云惟達者知通為一為是不用而寓諸庸之義如此深觀乃見此老之文章波瀾血脉之不可捉摸處此之謂以明己結了前夫言非吹也以來一章之意到此又從滑疑之聖人上生起立意𤼵論聖人無是無非至下文無適焉因是已二百三十餘言為一章今且有言謂世之立言以辯論者於此不知其與是類乎是指上滑疑之聖人乃無是無非者謂今且有人立言為辯者不知與此聖人是相類乎其與是不類乎謂與此聖人為不類乎類與不類相與為類則與彼無以異矣謂今言辯之人不必說與聖人類與不類但以己見叅合聖人之心妙契玄同則本無聖凡之別故與彼聖人無以異了無是非矣彼字即上是字指聖人也此一節結二聖人欲人自悟而忘其已是也下雖然一轉乃莊子特論本無是非之大同乃𤼵明大道之原也便是他真知諦見處雖然請嘗言之言本無是非雖然如此尚未透徹故請嘗試一論之有始也者即老子無名天地之始有未始有始也者此言有始亦無謂無始也即老子云同謂之玄有未始有夫未始有也者此未始有亦無即老子云玄之又玄眾妙之門此乃單言無形大道之原也有有也者有即天地人物老子有名萬物之母也有無也者因天地之有乃推無名天地之始此盖就有形以推道本無形也有未始有無也者此言天地萬物有形出於無形而大道體中有無不立故云未始有有未始有夫未始有無也者上言有無俱無此言俱無亦無逈絕稱謂方是大道之玄同之域故以此稱為虛無妙道俄而有無矣言大道體中了無名相一法不立故強稱虛無大道忽然生起有無而不知誰使之也前云若有真宰而不知有所為使直論到此方回頭照顧暗點于此而未知有無之果孰有孰無也言大道體中有無不立即今之有無誰使之為有無耶所謂若有真宰而求不得其朕今果返觀至此有無尚無安有是非之辯哉今我則已有謂矣言有無既無了絕名相何有言論之辯耶然我既已於無言之中而有言說矣但我言本無言而未知吾所謂之其果有謂乎其果無謂乎言我今既已有言但言其無言耳如前所謂鷇音是也原出於天機了無是非之相世人但觀我無言之言其果有言說乎果無言說乎但悟此無言之言則是非自冺矣已前釋言非吹也盖有機心之言也今莊子既說到忘言玄同之處意謂我今雖已有言乃從真宰而𤼵是無言之言若會我無言之言則忘言而歸一致矣下文重釋忘言歸一大小玄同了無是非如此乃真是也天下莫大於秋豪之末而泰山為小莫壽乎殤子襁褓中子而彭祖為夭此二句極難理會以上文已論歸大道之原今將以大道而一是非意謂若以有形而觀有形則大小壽夭一定而不可易者今若以大道而觀有形則秋毫雖小而體合太虛而太山有形只太虛中拳石耳故秋毫莫大而太山為小也殤子雖天而與無始同原而彭祖乃無始中一物耳故莫壽於殤子而彭祖為天也若如此以道而觀則小者不小而大者不大天者不天而壽者非壽矣如此則天地同根萬物一體何是非之有哉天地與我並生而萬物與我為一以道觀之萬物一體則天地與我並生萬物與我為一既已為一矣且得有言乎既以為一物我兩忘更復何言既已謂之一矣且得無言乎既已稱謂為一則言惡乎存而不可哉一與言為二謂無形之一今稱謂之為一則是兩一成二矣二與一為三今又以言說彼兩一則觀待而為三矣自此已徃巧曆不能得而况其凡乎自以言相待而為三則相待無窮縱有巧於曆數者不得終窮矣况其凡乎故自無適有以至於三而况自有適有乎言自無才適有則已成三而况自有適有則無極矣無適焉因是已無適者謂安心於未始有已前則湛然常一而不遷矣前云眾人因是而有是非聖人不由而照之于天亦因是也故一往論到未始有物已前天地萬物混而為一故不離於道如此為真是所言聖人因是者乃無適為是此正照之於天也此文之照應處此一節明妙契玄同天地同根萬物一體安心於大道不起分別則了無是非此乃真是故結之曰無適焉因是已下文又重提起一是字乃是非之根原夫道未始有封本無形相人我界限言未始有常常者執定不化之意乃是非之言也任道而言則無可不可了無一定是非之相為是而有畛也只因執了一箇是字故有是非分別之辯請言其畛有左有右有倫有義有分有辯有競有爭此之謂八德意謂從無適有則有無二字已成對待矣既有之後則有左右之序有左右則有倫義有倫義則有分辯則有爭競此相因而有乃執定而不可化者盖從一是字為病根只如以左為是而右則决不可易世俗之情以此分辯為能故謂之八德此德乃能義前一往從迷至悟說到大道根底因是已一句已結絕了至此又提起大道本無是非不知這些分辯執着從何而有只要提出一箇是字為病根要使人識得破六合之外聖人存而不論道包天地與太虛同體本無封畛只為眾人迷大道而執己見為是故是非之辯由之而起聖人心與道合即六合之外未嘗不知但存之而不論以非耳目之所及恐生是非故不論耳六合之內聖人論而不議六合之內聖人未嘗不周知萬物但只論其大綱如天經地義以立君臣父子之序而不議其所以之詳春秋經世先王之志聖人議而不辯春秋乃為經世君臣父子之大經大法聖人但議其名分品節之詳而不辯其是非之曲折故分也者有不分也夫道一而已本來不分但在天地有形之內而人倫之序不得不分人物雖分而道未嘗分所謂性一而已矣辯也者有不辯也雖天地間有眾口之辯其實有不可辯者乃忘言之大道存焉曰何也謂何以有不辯不分之義耶聖人懷之聖人與道為一明知萬化之多而未嘗分明知眾口之辯而道非言之可及故葆光斂耀懷之於心而不示於人眾人辯之以相示也眾人其實未達大道之原而強不知以為知且執以己見為必是而以嘵嘵之辯𡘆示於人故大道隱矣故曰辯也者有不見也故曰者引古語也老子云善者不辯辯者不善此一節釋滑疑之聖人與道為一以至無適焉因是己意謂聖人心同太虛即六合內外之事未嘗不知但懷之而不辯以顯好辯者其實未明大道也下文重釋不言不辯之義夫大道不稱道本無名故不可以稱大辯不言不言之辯是非了然大仁不仁不是有心要仁大廉不嗛嗛滿也不以廉自滿大勇不忮忮害也大勇乃自全道力非害於人也道昭而不道謂大道昭昭言則非道言辯而不及道本絕言縱有言辯亦不能及仁常而不成仁若常持有心則有私愛故不能大成萬物廉清而不信信實也謂矯矯以自清立名則無實德矣勇忮而不成勇若有害人之意則為血氣而不成道義之勇矣五者园而幾向方矣五者名雖可行於世以皆出有心卒莫能行故幾向方矣故知止其所不知至矣以上五者幾方而不能行者以恃小知自私之過其實未知大道之原也由是而知聖人止其所不知之地乃以為至也此結前古之人其知有所至以來一章之義孰知不言之辯不道之道若有能知此之謂天府言所不知之地乃大道之原也此中本無辯論言說若有人知此不言之辯不道之道正若樞之環中以應無窮故能知此者謂之天府注焉而不滿大道體虛大海不足以比其量故大地之水注之而不滿酌之而不竭即大地酌取而亦不竭而不知其所由來所謂虛而不屈動而愈出而不知其所從來此之謂葆光葆猶包藏而不蕗也前云滑疑之耀聖人之所圖以來只說到此乃結指其義曰此之謂葆光前云滑疑之耀聖人所圖故舉六合內外之事聖人無所不知但知而不言以其大道本來無知無辯故也聖人安住廣大虛無之中以遊人世故和光同塵光而不耀是之謂葆光聖人工夫必做到此方為究竟故云聖人所圖故昔者堯問於舜曰我欲伐宗國名膾國名胥敖國名南面而不釋然其故何也不釋然者謂心中必欲伐之次罷而不能釋然不知何故也舜曰夫三子者猶存乎蓬艾之間若不釋然何哉言堯之心不廣不能容物也且三子所處甚微細如蓬艾之間誠不足以芥蔕於胷中者若不釋然何不自廣也昔者十日並出萬物皆照而况德之進乎日者乎言堯之德未至也昔者十日並出則光明廣大萬物畢照况德之勝過於日者乎苟自德已至則廣大光明無物不容况三子之微細乎此因上葆光之聖人其心廣大如天府所謂聖人所圖者盖由工夫做到至處乃如此耳此言工夫未到則其心不廣不能容物故雖堯之大聖亦有所故十日並出為進德之喻以總結前意以終夫言非吹己來之意也下文重申明至人止其所不知以顯聖人之成功以結死生無變於己而况利害之端乎齧問乎王倪曰子知物之所同是乎曰吾惡乎知之要明不知之真知故托王倪以𤼵揮子知子之所不知邪曰吾惡乎知之若有知則有所不知則非真不知之地矣然則物無知邪曰吾惡乎知之雖然嘗試言之庸詎知吾所謂知此知乃世人之知之非不知邪謂世人之知不是我之不知耶庸詎吾所謂不知之我之不知非知邪言我之不知不是世人之知耶謂聖凡之知本來無二但世人習於妄知故偏執為是總非真知耳且吾嘗試問乎汝𤼵明不是正知之意民濕𥨊則腰疾偏死鰌然乎哉言人但知安寢乾燥屋宇若近濕則腰疾偏而鰌臥泥中豈若人哉木處則惴慄恂懼猿猴然乎哉人處木枝則恐懼而猿猴以為安便豈若人哉三者孰知正處三者謂人鰌猿猴各知安其所習以為常於己未嘗不是但各隨一己俗習之知耳何者為正知哉民食芻豢乃民之所習知麋鹿食薦薦草也乃麋鹿所習知蝍且蜈蚣也甘帶帶蛇也鴟鴉嗜鼠此四者各以為知常味四者孰知正味以各知之味如此豈知正味哉猨猵狙為雌偏狙亦猨同形而類別麋與鹿交麋小而鹿大鰌與魚遊鰌無合與魚遊而孕子毛嬙麗姬二人皆美女人之所美也魚見之深入鳥見之高飛麋鹿見之决驟四者孰知天下之正色哉美女人人所愛彼四物見之而驚走遠去是果色之可美耶試問以下歷舉安居食色皆世人之所知也人則以為必是而不可易者然彼諸物各又不然是則誰為正知哉若執各人之知為然而彼又有不然者斯則世人之小知小見豈可執為真是耶自今觀之仁義之端是非之塗樊然殽亂吾惡能知其辯將上人物各非真知則觀今之以仁義為必是者豈真是哉且如仁義聖人以治天下而盜跖即以之為大盜若以聖人為是而盜跖亦是若以盜跖為非則聖亦非也如此是非不定吾何能盡知其辯哉齧曰子不知利害則至人固不知利害乎設此一問要顯至人之德不同王倪曰至人神矣不可以利害名目大澤焚而不能熱言至人豈但不知利害即大澤焚而不能熱河漢沍冰凍也而不能寒疾雷破山風振海而不能驚言至人神超物表不與物對故物不能傷若然者若如此者乘雲氣騎日月即磅礴日月而游乎四海之外死生無變於己而况利害之端乎此結聖人之德謂至人與道混融神超物外卓出於死生而况世之小利害乎此一節申明前文至人止其所不知以言世人各非正知而執為必是其所知者如此而已以此是非吾惡能知其辯哉以結至人不知之至乃超出生死之人豈常情可測耶下文說齊死生以夢覺觀世人則舉世無覺者以顯是非之辯者皆夢中說夢耳文極奇而義極正瞿鵲子問乎長梧子曰吾聞諸夫子聖人不從事於務言不以世故為事務不就利不知所利也不違害不知有害可避也不喜求言無求於世也不緣道言無心合道而無緣道之跡也無謂有謂以不言之教有謂無謂言𤼵於天機無心之言如鷇音也而遊乎塵垢之外超然遊於物外也夫子孔子也以為孟浪之言孟浪謂不着實猶無稽之言也而我以為妙道之行也吾子以為奚若何如也長梧子曰是黃帝之聽熒也謂汝之此言即黃帝聽之亦熒惑而不悟也而丘也何足以知之意謂孔夫子亦世俗之人耳何足以知此哉且女亦太早計言瞿鵲子才聞此言即以為妙道之行亦計之太早也見卵而求時夜才見卵而便求報曉之雞見彈而求鴞𬉹才見彈而便求鴞𬉹此太早計之譬也予嘗為女妄言之予以至人之德為女妄言之女以妄聽之奚奚何如也旁日月言至人之德如此挾宇宙宇宙在手乎為其脗合至人與萬化𭰞然混合而為一體置其滑昏以𨽾相尊𨽾猶言𨽾役也言自天子諸侯卿大夫士皆是以𨽾役相役而相尊者此皆世之滑昏之人所為者至人不與物伍故一切置之而無心也眾人役役役役於物欲而不自覺此皆以𨽾相役役者聖人愚芚芚草之未萌也言聖人無心於世不識不知泊兮於未兆已前參萬歲而一成純聖人入於不死不生故參萬歲而成純言不有於世故聖人了無是非之心也萬物盡然而以是相蘊言萬物本來道通為一本無是非如聖人渾化故曰盡然但眾人只以一是字蘊成我見故有生死是非之辯耳予惡乎知說生之非惑耶言本無生可欣而眾人恱而貪之豈非惑耶予惡乎知惡死之非弱喪而不知歸者耶言聖人視生如遠逝視死如歸家而眾人惡死豈非弱喪而不知歸者耶弱喪乃自幼喪失家鄉者麗之姬麗姬美女也艾地名封人掌艾之官之子也晉國之始得之也麗姬納於晉君涕泣沾襟言麗姬始至晉時以為不樂故涕沾襟及其至於王所與王同筐牀與王同臥起食芻豢食美味遂以為樂而後悔其泣也既知其樂乃悔昔之不知為苦也此喻死者人之所歸乃最樂者人不知耳子惡乎知夫死者不悔其始之蘄生乎若知死之樂安知不悔昔之不當求生耶此以為樂盖言得免形骸生人之苦累故以死為樂亦非佛之寂滅之樂以佛証之正是人中修離欲行得離欲界生死之苦而生初禪禪天之樂亦非世間人以死為樂也觀者須善知其義夢飲酒者旦而哭泣夢哭泣者旦而田獵此言觀人世如夢觀死生如夜旦以此而遊世間乃至人之行也夢覺相返者以未覺乎大夢故以死生為憂喜苟知夢覺一如則死生一條矣方其夢也不知其夢也夢之中又占其夢焉言世都在迷中而自不知其迷如夢中不知其夢也而世人且自以為有知為是而辯於人此如夢中占夢其實不自知其在迷也且有大覺而後知此其大夢也必有大覺之聖人乃能正眾人之夢語也而愚者自以為覺竊竊然知之而世之愚人好執是非之辯者而不自知在迷中而自以為覺故竊竊然私自以為知者故𡘆示於人此舉世古今昏迷之通病也君乎牧乎固哉丘也君乎者暗指堯舜已下之為君者牧乎暗指伊呂已下之卿相者固哉丘也明指孔子此通說堯舜禹湯文武周公孔子凡以仁義治天下而必要歸於己是而為道者皆夢中說夢之人也與女指長梧子也皆夢也予謂女夢亦夢也即我說女夢我亦是夢中說女之夢耳是其言也如此夢言其名為弔詭弔至也詭怪也謂此夢說乃至怪之談而女夢中之人亦信不及萬世之後而一遇大聖知其解者是旦暮遇之也言必待萬世之後遇一大覺之聖人知我此說即我與之為旦暮之遇也意此老胷中早知有佛後來必定印證其言不然而言大覺者其誰也耶此一節明至人所以超乎生死而遊人世者以觀世間如大夢死生如夜旦憂樂如夢事迷中說是非如夢占夢迷中正是非如白日說夢事總而言之皆在大夢之中耳似此若不是至人看破誰知此是大夢耶愚者竊自以為覺豈不陋哉即自古堯舜已下之君相以及孔子皆夢中說夢之人耳莊子自謂我此說亦在夢中無人證者必待後世有大覺之大聖方知我今日之夢說不妄也此論極正大痛切而入聖工夫亦即於此可見矣此結前執是非之論也後文翻覆𤼵明此意以結前文總歸於大道之原既使我與若辯矣若勝我我不若勝若果是也我果非也邪此釋上皆在夢中之辯無能正者我勝若若不我勝我果是也而果非也邪其或是也其或非也邪其俱是兩家俱是也其俱非也耶我與若不能相知也以俱在夢中說夢爾我誰能知其是非耶則人固受其黮闇暗昧不明白也吾誰使正之言彼聞爾我之辯者都被瞞了在暗昧之中將使誰人正之耶使同乎若者正之既與若同矣惡能正之使與汝一樣人正之既與汝一般見識又何能正我之心耶使同乎我者正之既同乎我矣惡能正之使與我一樣人正之既與我一般見識又何能正汝之心耶使異乎我與若者正之既異乎我與若矣惡能正之使不同爾我兩家之人正之既絕與爾我不同識見各別又何能正爾我之是非哉使同乎我與若者正之既同乎我與若矣惡能正之既與我兩家一樣决不能正之矣然則我與若與人俱不能相知也言大家都在夢中辯夢占夢說夢事之是非畢竟何能相知哉而待彼也耶彼字近指前文所待大覺之聖人遠則指前非彼無我之彼字意指真宰謂既舉世之人都在迷中橫生是非之辯如夢中諍論誰能解而正之除非是大覺之聖人出世方能了然明白若不待聖人直須各人悟了本有真宰則不由是非而照之於天然大道則是非亦冺絕矣故下句即云和之以天倪天倪即前之休乎天均皆釋前照之於天謂真宰乃天然大道之體非世人迷執之我見也莊子文章脉絡首尾相貫如地中之泉今此文橫說竪說三千餘言到此只以一彼字結之看是何等力量但看𤼵論之端暗點出真宰但云非彼無我以一彼字為主到底猛然突出一句曰待彼也耶若看破此機軸則文章變化神矣何謂和之以天倪倪端倪也謂天然大道之實際也何謂二字乃重釋之辭也前文並無和天倪之說但云聖人和之之是非而休乎天均始云聖人不由而照之於天盖此天倪即前之天均而結歸照之于天以初從是非方生方死之間就要照之於天及說到勞神明而不能一則曰聖人和之以是非而休乎天均到此議論已完了故總前意乃曰何謂和之以天倪盖即結歸和是非之天均也但以均字變為倪字故不識其意耳曰是不是然不然是然乃兩家各執之偏見也若果是也則是之異乎不是也亦無辯言是既異於彼不是矣又何庸辯然若果然也則然之異乎不然也亦無辯謂然既異於不然矣又何庸辯哉化聲之相待無而忽有曰化言空谷之響乃化聲也謂觀音聲如空谷傳響了無情識又何是非之有哉此一句又總結前地籟長風竅響音聲唱和皆化聲也若觀言語音聲如風吹竅響何有是非之執所以有是非者盖是有機心之言故競執為彼此之是非耳故𤼵論之初乃曰夫言非吹也為是非𤼵端今齊物論已了必指歸於地籟故曰化聲相待乃究竟齊物之工夫若言語音聲如地籟則言出天真了無機心乃真天籟也觀前𤼵端之地籟則振蕩乾坤一叚說話歸結到了但輕輕以化聲相待四字結之看是何等之胷襟致思筆力變化文章到此不可思議矣若其不相待和之以天倪此一句結齊物論之工夫也謂若果觀舉世言論之音聲如風吹竅鳴則是化聲相待則言出天機了無是非之執矣若其不能如化聲相待則當和之以天倪而休乎天均則不由是非之情而當照之於天如此則物論不齊而自齊也不然則終無可齊之日矣因之以蔓衍蔓衍者謂散漫流衍即橫說竪說如樞得環中以應無窮是一亦無窮非一亦無窮所謂惡乎存不可也以言出天真無往而非道故能和之以天倪則可矢口而談故曰因之以蔓衍也所以窮年也忘年忘義前云於道有虧則辯者終身無成以自以為成故非成耳今載道之言出乎天真之自然隨其成心而師之則無往而非道如此則優游卒歲了無成名之心身住世間心超生死則足以忘年了無人我彼此之分故能忘義而無一定之辯真人應世與物無競如此而已振於無竟故寓諸無竟無竟者乃絕疆界之境即大道之實際所言廣莫之鄉曠垠之野皆無竟之義也言真人處世凡所振作舉動皆與道冥一施為動作於大道之鄉故曰振於無竟故栖神於寂寞冲虛故曰寓諸無竟此齊物論之究竟指歸實際處也如此一篇大文章開端如許驚天動地若不指歸實際則為荒唐之說矣此一節總結齊物論之究竟處也首以喪我為𤼵啟則意在物論之不齊皆執我見之過也今要齊物必先忘我此主意也次將顯世人之言語音聲乃天機之所𤼵但在有機忘機之別故分凡聖之不同故以三籟𤼵端意在要將地籟以比天籟但人有小知大知之不同故各執己見為必是故說了地籟即說大知小知之機心情狀之不一故不能合乎天機如地籟之風吹竅響耳如此者何也盖由人迷却天真之主宰但認血肉之軀以為我故執我見而生是非之強辯者盖迷之之過也故次點出真宰要人先悟本真要悟本真須先拋却形骸故有百骸九竅之說要人看破形骸而識取真宰若悟真宰則自然言言合道皆𤼵於天真是所謂天籟也今之辯論之不齊者盖是機心之言故執有是非故立論是非之端首云夫言非吹也一句提起以生後面許多是非之情狀皆從非吹二字𤼵揮但凡人迷之而不悟在聖人已悟則不由眾人之是非故凡所言者皆照於天也從此照之於天一語以立悟之公案故向下說到是非不必強一但只休乎天均則不勞而自齊一矣如是重重議論到末後是非卒無人正之者如舉世古今皆是夢中說夢必待大覺之聖人方能正之即不能待大覺之聖人亦只須了悟各人之真宰則物論是非自明矣到此了悟之後是非自明則凡所言者皆出於天真如地籟無異矣故末後以化聲相待一語以結之若未大悟則凡所語言皆當照之於天而休乎天均為工夫故以和之以天倪為結語此通篇之血脉立言之本意也但文章波瀾浩瀚難窺涯際若能看破主意則始終一貫森然嚴整無一字之剩語此所謂文章變化之神鬼者也下文總以形影夢幻為結以見真實之工夫也罔兩影外之影也問景曰曩子行今子止曩子坐今子起何其無特操與言行止起坐不常何以無一定之特操也曰吾有待而然者邪影謂盖不由我以有待者形也吾所待又有待而然者邪吾待蛇蚹蜩翼邪言我所待者形若蛇蚹蜩翼之做物耳彼何知哉惡識其所以然惡識其所以不然言彼假形塊若無知之物若蛇之蚹蜩之翼與真宰無相干者但任其天機之動作耳又何以知其然與不然耶意謂世人學道做忘我工夫必先觀此身如影如蛇蚹蜩翼則我執自破矣昔者莊周夢為蝴蝶栩栩然蝴蝶也相相然喜意自喻適志與不知周也言夢中為蝴蝶自喜自適竟不知其為周也俄然覺則蘧蘧然蘧蘧然僵臥之貌周也覺來依然一周耳不知周之夢為蝴蝶歟蝴蝶之夢為周歟周與蝴蝶則必有分矣言夢覺之不同但一周耳不知蝴蝶為周周為蝴蝶此處定有分曉要人看破則視死生如夢覺萬物一觀自無是非之辯矣此之謂物化物化者萬物化而為一也所謂大而化之謂聖言齊物之極必是大而化之之聖人萬物混化而為一則了無人我是非之辯則物論不齊而自齊也齊物以一夢結則破盡舉世古今之大夢也由是觀之莊子之學不易致也非特文而已矣此結齊物之究竟化處故托夢覺不分以物化為極則大槩此論立意若要齊物必先破我執為第一故首以吾喪我𤼵端然吾指真宰我即形骸初且說忘我未說工夫次則忘我工夫須要觀形骸是假將百骸九竅六藏一一看破散了於中畢竟誰為我者方才披剝出一箇真君面目意謂若悟真君則形骸可外形骸外則我自忘我忘則是非冺矣此其中大主意也重重立論返覆𤼵揚者此耳謂若未悟真君則舉世古今皆迷如在大夢之中縱有是非之辯誰當正之耶縱有正之者亦若夢中占夢耳若明正是非必待大覺之聖人即不能待大聖亦直須各人了悟當人本來面目方自信自决矣要悟本來真宰須是忘我然忘我工夫先觀人世如夢是非之辯如夢中事正是非者如夢中占夢之人若以夢觀人世則人我之見亦自解矣雖解人我而未能忘言若觀音聲如響則言語相空如此則言自忘矣言雖忘而未能忘我則觀自己如影外之影觀血肉之軀如蛇蚹蜩翼此則頓忘我相不必似前分析也盖前百骸九竅一一而觀乃初心觀法如內教小乘之析色明空觀今即觀身如影之不實如蛇蚹之假借乃即色明空更不假費工夫也雖觀假我而未能忘物故如蝶夢之喻則物我兩忘物我忘則是非冺此聖人大而化之成功也故以物化結之如此識其主意攝歸觀心則不被他文字眩惑乃知究竟歸趣此齊物之總持也觀者應知音釋翏憐蕭切音聊長風聲枅堅奚切音雞柱上橫木承棟者宎伊鳥切音杳竅聲也鷇五候切音宼鳥子也唐丁切音屋梁也襁褓上舉兩切音鏹下補抱切音保負兒衣也畛止忍切音軫田間陌也芚敕倫切音椿無知貌蚹符遇切音附蛇腹下橫鱗可以行者
