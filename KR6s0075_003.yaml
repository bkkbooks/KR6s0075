body:
  text: 明匡廬逸叟憨山釋德清注養生主此篇教人養性全生以性乃生之主也意謂世人為一身口體之謀逐逐於功名利祿以為養生之䇿殘生傷性終身役役而不知止即所謂迷失真宰與物相刃相靡其形盡如馳而不知歸者可不謂之大哀耶故教人安時處順不必貪求以養形但以清淨離欲以養性此示入道之功夫也吾生也有涯人生如隙駒耳有限光陰而知也無涯知者妄想思慮日夜相代而無涯以有涯隨無涯殆已以有限之身命隨無窮之妄想勞心悴形危之甚也已而為知者殆而已矣既已危殆且迷而不覺猶自以為知者終於殆而已矣不可救也為善無近名為善無近名之心為惡無近刑為惡無近刑之事蓋善惡兼忘虛懷遊世不以物為事緣督以為經緣順也督理也經常也言但安心順天理之自然以為常而無過求馳逐之心也可以保身可以全生可以養親可以盡年苟順天理則不貪欲以殘生故可以保身全生不辱身以傷命故可以養親盡年此所謂能養生之主也逍遙之聖人則忘己忘功忘名故得超然於物外齊物之愚夫競名好辨迷真宰而不悟此聖凡之辨也故今示之以入聖之功夫以養生主為首務也然養生之主只在緣督為經一語而已苟安命適時順乎天理之自然則遇物忘懷絶無意於人世則若己若功若名不待忘而自忘矣此所以為養生主之妙術也故下以庖丁解牛喻之庖丁為文惠君梁惠王也解牛不言解牛之妙術手之所觸隨手所至也肩之所倚案牛之度也足之所履踏牛於地也膝之所踦跪而下刀之狀也砉音吸然響然用刀之聲也奏刀騞音畫然進刀之聲也莫不中音言有節數也合於桑林舞名之舞乃中經首樂名之會衆樂齊奏言技之妙而間之度如此初無用力倉皇之意也文惠君曰嘻嘆其妙也善哉技蓋至此乎言解牛之技妙極於此也庖丁釋刀對曰臣之所好者道也進用也乎技矣言臣始非專於技蓋先學乎道以悟物有自然天理之妙故施用之於技耳始臣之解牛之時所見無非牛者言未得入道則目前物物有礙故始解牛之時則滿目只見有一牛三年之後未嘗見全牛也言初未見理則見渾淪一牛既而細細觀之則牛外之頭角蹄膊內之五臟百骸筋骨一一分之各各不一件件有理自然而不可亂者由是而知無全牛也久之則果然見其無全牛也方今之時臣以神遇而不以目視由臣細觀其牛件件分析有一定天然之腠理了然於心目之間故方今解牛不須目視任手所之無不中理者官官知止而神欲行官謂耳目等五官也但以心目知其所止而神即隨其所行故信手所之迎刃而解依乎天理但依骨肉之間天理之自然批音撇大卻音隙導大窾因其固然言任刀所批者則有大卻隨手所引者則有大窾空處但只因固然一定之理而游刃其間技經肻綮骨肉連結處也之未嘗而况大軱骨也乎言任理用刀從骨肉小小連絡處亦不見有齟齬而况有大骨為礙乎良庖嵗更刀割也言良能之庖則一嵗一換其刀者但割切而已族衆也庖月更刀折猶斫也也言廬衆之庖月換一刀則砍斫之故易傷也今臣之刀十九年矣臣之刀十年為率今已用九年矣所解數千牛矣而刀刃若新發於硎硎磨刀石也言臣之刀已解數千牛矣而其鋒銛利如初磨一般全未傷也彼節者有間言彼骨節自有間隙而刀刃無厚以無厚入有間恢恢寬大也乎其於遊刃必有餘地矣是以十九年而刀刃若新發於硎言刀之所以不傷者以彼牛之骨節之間自有天然之空處且刀刃薄而不厚以至薄之刀刃入有空之骨節則寬大任其游刃尚有餘地又何傷鋒犯手之有所以十九年而刀若發硎也雖然每至於族筋骨盤結處也吾見其難為言雖然遊刃如此任理而行其間亦有筋骨盤結沒理處吾亦見其難此則不可任意而行也𪫟警惕也然為戒言不敢妄動也視為止視其所止也行為遲行刀少緩也動刀甚微謋劃也然已解如土委地言至難處則為惕然小心不可亂動端詳其所止緩緩下手如此則用力不多故動刀甚微而難解處則劃然已解如上之崩委於地也提刀而立為之四顧言已解其難解故提刀四顧以暢其懷也為之躊躇四顧也言仍四顧其難解之狀也滿志快于心也善刀而藏之善拂拭其刀而藏之也文惠君曰善哉吾聞庖丁之言得養生焉此養生主一篇立義只一庖丁解牛之事則盡養生主之妙以此乃一大譬喻耳若一一合之乃見其妙庖丁喻聖人牛喻世間之事大而天下國家小而日用常行皆目前之事也解牛之技乃治天下國家用世之術智也刀喻本性即生之主率性而行如以刀解牛也言聖人學道妙悟性真推其緒餘以治天下國家如庖丁先學道而後用於解牛之技也初未悟時則見與世齟齬難行如庖丁初則滿眼只見一牛耳既而入道已深性智日明則看破世間之事件件自有一定天然之理如此則不見一事當前如此則目無全牛矣既看破世事則一味順乎天理而行則不見有一毫難處之事所謂技經骨綮之未嘗也以順理而行則無奔競馳逐以傷性真故如刀刃之十九年若新發于硎全無一毫傷也以聖人明利之智以應有理之事務則事小而智巨故如游刃其間有餘地矣若遇難處沒理之事如筋肻之盤錯者不妨小心戒惕緩緩斟酌於其間則亦易可解亦不見其難者至人如此應世又何役役疲勞以取殘生傷性之患哉故結之曰聞庖丁之言得養生焉而意在至人率性順理而無過中之行則性自全而形不傷耳善體會其意妙超言外此等譬喻唯佛經有之世典絶無而僅有者最宜詳玩有深旨哉下文言其不善養生之人公文軒人姓名見右師官名介者也而驚曰此何人也惡乎介也言此是何等人因何而刖足也天與其人與言云一足是天使與歟抑人為之歟曰天也非人也復自應之曰此天使之也非人也天之生是使獨也言右師生而貪欲自喪天真故罪以取刖即是天刑其人使之獨也人之貌有與也以是知其天也非人也言人生皆天與之形也今右師之介其足即是天使之不全也澤雉十步一啄百步一飲不蘄畜乎樊中神雖王不善也言澤雉飲啄雖如此之艱難亦甘心適性不肻求人畜於樊籠之中謂樊中之養其神雖王且知困苦不自安故以為不善而不求之也右師貪而忘形不如澤雉多矣故其刖也實天刑之而不自知耳此一節言不善養生者見得忘真見利忘形自取殘生傷性之患不若澤雉之自適也下言雖聖人苟不能忘情亦是喪失天真者故借老子發之老聃死秦失弔之秦失老聃之友也三號而出言無哀切之情也弟子秦失之弟子曰非夫子之友耶曰然言是吾之友也然則弔焉若此可乎弟子謂既為夫子之友而不盡其哀其可乎曰然謂實無哀痛也始也吾以為其人也言我始與友時將謂是有道者也而今非也今日死後乃知其非有道者也何以知之向吾八而弔焉有老者哭之如哭其子少者哭之如哭其母彼其所以會之必有不蘄言而言不蘄哭而哭者言老少哭之如此其哀必生時與彼兩情相合而中心有不能自已者故不蘄哭而哭之哀如此也是遁天倍與悖同情忘其所受古者謂之遁天之刑刑猶理也言聃之為人不能忘情而處世故有心親愛於人故人不能忘此實自遁天真忘其本有古人謂此乃遁喪天真而傷其性者非聖人也適來夫子時也適來而有生亦順時而生也適去夫子順也言適死而去乃造化之所遷而天真泰然未嘗有去來死生者也安時而處順哀樂不能入也言生則安其時死則順其化又何死有哀而生可樂耶達其本無生死故也古者謂是帝之縣解帝者生之主也性繫於形如人之倒懸今超然順化則解性之懸矣指窮於為薪火傳也不知其盡也言形雖化而性常存如薪盡而火存有形相禪如薪火相傳是則生生而不已化化而無窮故如薪火之傳不知其盡也此言性得所養而天真自全則去來生死了無拘礙故至人遊世形雖同人而性超物外不為生死變遷者實由得其所養耳能養性復真所以為真人故後人間世即言真人無心而遊世以實庖丁解牛之譬以見養生主之效也篇雖各別而意實貫之人間世此篇蓋言聖人處世之道也然養生主乃不以世務傷生者而其所以養生之功夫又從經涉世故以體驗之謂果能自有所養即處世自無伐才求名無事強行之過其於輔君奉命自無誇功溢美之嫌而其功夫又從心齊坐忘虛己涉世可無患矣極言世故人情之難處苟非虛而待物少有才情求名之心則不免於患矣故篇終以不才為究竟苟涉世無患方見善能養生之主實與前篇互相發明也以孔子乃用世之聖人顏子乃聖門之高弟故借以為重使其信然也顏回見仲尼請行曰奚之仲尼問何往曰將之衛曰奚為焉意謂雖顏子之仁人亦不勉無事強行之過曰回聞衛君蒯聵也其年壯壯年盛氣之時其行獨言狠戾自用拒諫妄為也輕用其國而不自見其過言不恤民輕視其國不自知其過輕用民死言不恤民故民死亡者衆死者以國量乎澤若蕉言以國比乎澤而民之死者相枕籍若澤中之蕉也民其無如往也矣言民受用無所往告矣回嘗聞之夫子曰治國去之言國已治不以無功而干祿亂國就之言勘亂扶危以安民也醫門多疾謂善救時者如良醫之門多疾人也願以所聞思其則蓋回素聞夫子之言如此故願以所聞思其法則將以匡正衛君也庶幾其國有瘳乎言庶幾使民免其疾苦也仲尼曰嘻驚嘆也若殆往而刑耳言汝甚欲往必遭其刑耳夫道不欲雜謂學道當專心一志不可雜亂其心雜則多多則擾擾則憂憂而不救言心雜則以多事自擾擾則憂患而不可救古之至人先存諸己而後存諸人言古之至人涉世先以道德存乎己然後以己所存施諸人即此二語乃涉世之大經非夫子不能到此所存於己者未定何暇至於暴人之所行謂顏回道德未充自修不暇又何暇至暴人之所乎且若汝也亦知夫德之所蕩而知之所為出乎哉蕩散也出露也德蕩乎名知出乎爭德之不能保全者為名之蕩也名蕩而實少矣知之發露於外者以啓爭之之端也名也者相軋也軋軋機聲也言名者乃彼此相擠軋不得獨擅也知也者爭之器也才知一露人人忌之則由此而致爭不相安也二者凶器非所以盡行也言才德知術二者乃招患之端為凶器也豈可以盡行乎且德厚信矼矼確實貌未達人氣謂我以厚德確信加人必先要達彼之氣味與我投與不投名聞不爭未達人心言我雖不爭名聞於彼且未達彼之人之心信否何如而彊以仁義繩墨之言術當是衒字暴人之前是以人惡有其美也命之曰菑人菑人者人必返菑之若殆為人菑言己雖確信虛己致彼且未審彼之氣味不達心志即以仁義繩墨之言規諫於彼恐一旦致疑而不信則將以汝為因揚彼之惡而顯己之美所謂未信則為謗己也此謂之菑害於人凡菑人者人必反菑之汝不審彼已而彊行殆為彼人菑之也且苟為悅賢而惡不肖惡用而汝也求有以異且彼衛君誠有悅賢而惡不肖之心則彼國自有賢者何用汝特往而求以顯異耶若汝也惟無詔言汝必不待詔而往王公必將乘人而𨷖其捷言女非詔命而往則彼王公必將乘人君之勢與汝𨷖其捷勝而不納其言而汝也目將焚之言汝見人君之勢以加凌之則必自失其守眼目眩惑之矣而色將平之眼目一眩必將自救而容色平和以求解矣口將營之容貌既已失措而口必營營以自救也容將形之容貌言辭一失則全身不覺放倒遷就也心且成之外貌一失則內心無主必將捨己而就彼返成其惡也是以火救火以水救水名之曰益多言女初心欲彼改惡而竟返成其惡是以水火而救水火但增益其多耳順始無窮言始則將順而彼之惡竟無窮若汝也殆以不信厚言必死於暴人之前矣若彼不見信而遽加之以忠厚之言是謂交淺言深彼將致疑而返以為謗如此則必死無疑矣此一節言涉世之大者以諫君為第一若人主素不見信而驟以忠言強訴不唯不聽且致殺身之禍此非夫子之大聖深達世故明哲保身者其他孰能知此哉顏子有所未至也此為人間世之第一件事故首言之且昔者桀殺關龍逢紂殺王子比干是皆修其身以下傴拊人之民以下拂其上者也言龍逢比干以忠立名而竟見殺者蓋為居臣下之位而傴拊人君之民者傴拊言曲身拊恤於民以示憐愛之狀也謂人君不愛民而臣下返為之愛恤是自要名以拂逆人主之心此所以見怒而取殺也豈非好名取死之道耶故人君因其修以擠之是好名者也言二子好名而修身以拂人君故人君因其修而擠害之是好名之過也昔者堯攻叢枝胥敖二國名禹攻有扈國名國為虛厲使其國為空虛死其君為厲鬼身為刑戮親身操其殺戮其用兵不止其求實無己謂二聖自以為仁將除暴救民是皆求為仁之實無己故用兵不止以此好名以滋殺戮是皆求名實者也求仁之名而行殺伐名成而實喪矣而汝也獨不聞之乎名實者聖人之所不能勝平聲也言名實雖二聖人且不能勝而全有之而况若汝也乎此謂顏子無事強行求名之實必不能全以明往必刑之之必然也且名實聖人猶不能全而况凡乎上文夫子以教其必不可往下又問其往之之道雖然若汝也必有以也嘗以語我來來語辭夫子謂雖然我如此說其勢必不可往不知汝將何術以往耶當以語我試看何如顏回曰端而虛勉而一則可乎回謂我無他術但端謹其身以虛其心不以功名得失為懷更勉一其志不計其利害如此則可乎曰惡惡可言其甚不可也夫以陽為充孔揚采色不定陽者盛氣言衛君壯年負驕勝之氣女以小心端謹事之則益充滿彼之盛氣而志更大飛揚將發現于顏面矣采色不定喜怒不常也常人之所不違言彼喜怒不常之氣性即尋常執待之人亦不敢違况汝未同與言之人乎因案人之所感以求容與自快之意也其心名之曰日漸之德不成而况大德乎言彼拒諫之人即汝以言感發之彼即定將所感之言返案於女以求容與以快其心不但不聽而已如此飾非之人即日漸小德亦不成況大德乎將執而不化外合而內不訾毀也其庸詎可乎言彼將固執己志而不化縱汝能端虛而外謹勉一而內不毀竟有何用乎言其必無功效徒費精神耳此一節言彊梁拒諫之人縱以忠謹事之秪增益其盛氣亦無補於德終無益也然則我內直而外曲成而上比此顏回聞夫子之言以端虛勉一必不能行又思其則以內直外曲上比古人挾此三術以往其事必濟矣內直者與天為徒此顏回自解三術之意言內直與天為徒者言人之生也直此性本天成則彼我同此性也故曰與天為徒謂彼亦人耳既同此性苟言之相符寧無動於中乎與天為徒者知天子之與己皆天之所子而獨以己言蘄乎而人善之蘄乎而人不善之耶若然者人謂之童子是之謂與天為徒言既天性本同則人君與我皆天之子也我但直性而言之亦不必求其彼之以我言為善為不善我唯盡此真純無僞之心如此則彼以我如赤子之心矣此又有何患焉外曲者與人為徒也擎跽曲拳人臣之禮也人皆為之吾敢不為耶為人之所為者人亦無疵焉是之謂與人為徒外曲者謂曲盡人臣之禮也不失其儀又何疵焉成而上比者與古為徒其言雖教謫謫謂指謫是非也之實也古之有也非吾有也若然者雖直而不為病是之謂與古為徒成者引其成言也上比者上比古人也故其言雖謫之而明言是非而所言皆實乃古人之言非我之虛談也如此則言雖直以非我出則不以為病矣若是則可乎以此三術則庶幾可乎仲尼曰惡惡可歎其必不可也太多政法而不諜政法猶法則也諜猶安妥謂穩當也言挾上三術而法則太多猶不穩當也雖固亦無罪雖然止是耳矣惡可以及化猶師心者也言以此三術固亦不得罪然止是如此而已耳亦不能使彼心化也何也以三術皆出有心未能忘我且已未成焉能化彼哉此一節言三術從孔子君子有三畏中變化來與天為徒畏天也與人為徒畏大人也與古為徒畏聖人之言也但議論渾然無跡言此三事亦非聖人大化之境界止於世俗之常耳意在言外顏回曰吾無以進矣言回之學問止此而已更無以進矣敢問其方請問夫子之教以可法也仲尼曰齊吾將語若言須齊心待聽我之教也若汝也有而為之其易耶言汝有心而為之事自己未化便欲化人豈容易耶易之者皡天不宜以有心之事為容易者其心不真故上天所不宜顏回曰回之家貧惟不飲酒不茹葷者數月矣若此可為齊乎此顏子未知心齊也曰是祭祀之齊非心齊也回曰敢問心齊仲尼曰一若志專一汝之心志無聽之以耳而聽之以心言返聞於心性無聽之以心而聽之以氣心尚未忘形氣則虛而形與化之矣聽止於耳心止於符謂心冥於理也氣也者虛而待物者也言心虛于極以虛而待物惟道集虛虛乃道之體也虛者心齊也教顏子之心齊以主於虛也顏子多方皆未離有心凡有心之言未忘機也機不忘則己不化故教之以心齊以虛為極虛則物我兩忘己化而物自化耳顏回曰回之未始得使實自回也言未受教待自以為有己得使之也未始有回也可謂虛乎一聞心齊之教頓忘其己此忘己可謂虛乎回于一言頓悟如此夫子曰盡矣謂心齊之理盡於此矣吾將語若言汝有受教之地矣故將語之若汝也能入遊其樊樊謂籓籬謂世網中也而無感其名言能遊人世虛己忘懷無以智巧以感動人而要其名入則鳴不入則止言不可執一定成心而往但觀其人精神氣味相入則言不入則止不可強行無門無毒門者言立定一箇門庭毒即暝眩之藥謂必瘳之藥此二者有患皆不可用也一宅而寓於不得已則幾矣一宅者謂安心於一了無二念即其所言當寓意於不得已而應之切不可有心強為如此則庶幾乎可耳絶跡易無行地難言逃人絶世尚易獨有涉世無心不著形跡為難即老子善行無轍跡為人使易以僞為天使難以僞聖人應世乃天之使也若是為人之使容可以僞聖人乘真心而御物又安可以僞乎聞以有翼飛者也未聞以無翼飛者也此有心無心之喻也言世人有心為事而成者有之若無心應物而使人感化若無翼而飛者此未之聞也聞以有知知者矣未聞以無知知者也言世人皆以有知而知之者聖人以無知而知者蓋言忘形絶智以無心而應物者此其難者未之聞也瞻彼闋者虛室生白此心虛之喻也謂室中空虛但有處則容光必照而虛室中即生白矣以喻心虛則天光自發也吉祥止止言有心而動則禍福隨之所謂吉凶悔吝生乎動也今若心虛無物則一念不生虛明自照悔吝全消惟吉祥止止而言此虛心乃吉祥所止之處也夫且不止是之謂坐馳言人心皆本虛明第人不安心止此私欲萌發則身坐於此而心馳於彼是之謂坐馳夫狥耳目內通而外於心知鬼神將來舍而況人乎狥作殉猶喪失也言喪耳目之見聞返見返聞故云內通若內通融於心體真光發露則不用其妄心妄知如此則虛明寂照與鬼神合其德故鬼神將來舍矣而況於人而不感化乎此無翼而飛者也此教回之極處也是萬物之化也謂喪耳目則形目忘外心知則智自泯則物我兩忘我忘物化則萬物盡化為道矣禹舜之所紐樞紐也伏羲几蘧古聖君也之所行終而況散焉者乎言物我兼忘萬物盡化此混歸大道之原即禹之神聖亦執為樞紐而伏羲几蘧之大聖御世終身所行而況散民乎顏回能以此用世又何強行之有哉此言涉世先於事君此言輔君之難也苟非物我兩忘虛心御物不得已而應之決不能感君而離患若固執我見持必然之志而強諫之不但無補於君且致殺身之禍此龍逢比干之死皆是之過也下言使命之難葉公子高葉公名梁字子高楚大夫也將使於齊問於仲尼曰王使諸梁也甚重意將有兵革之事齊之待使者蓋將甚敬而不急言齊君待使者貌雖恭而心甚慢不能應使者之急事匹夫猶未可動也而況諸侯乎言楚之事甚急而齊若慢之則不敢輕意催促且匹夫尚不可輕動況諸侯乎吾甚栗之恐誤國事而取罪故甚恐懼也子嘗語諸梁也曰凡事若小若大寡不道以歡成嘗憶夫子教我謂事無大小必以歡成儻齊之不歡則事難濟矣此所以恐也事若不成則必有人道之患言事若不成君能無罪我乎是必有人道之患也事若成則必有陰陽之患言齊儻不急必多方勞慮委曲求成則焦勞之病乃陰陽之內患也若成若不成而後無患者惟有德者能之有德者謂全德之聖人也意謂事之成與不成俱無患者惟聖人虛心應世不以物為事者能之也吾食也執粗而不藏善也謂不甘美之厚味也㸑無欲清之人言我之飲食淡薄無多烹庖故執㸑之人無有怕熱而求清涼者今吾朝受命而夕飲冰我其內熱歟言素無厚味故無內熱之症今朝受命而夕飲冰則火症內發乃憂愁焦思以動其火耳其內熱之病歟吾未至乎事之情實也而既有陰陽之患矣言未就事早有陰陽失錯內熱之病矣事若不成必有人道之患事若不成國君能無罪我乎此人道之患所不免者是兩也為人臣者不足以任之言此兩患在身事不由己故為人臣者所不能任之也子其有以語我來願夫子有以教我也此言人臣以使命為難也以為人臣者但以一己功名為心故事必求可功必求成以此橫慮交錯於胸中勞神焦思之若此乃舉世人臣使命之難絶不知有所處之道故不免其患耳故夫子教以處之之方意有一定之命一定之理安順處之自無患耳若持必可之心固所不免也下夫子教其莫若致命此其難者將此起語為結仲尼曰天下有大戒二大戒者謂世之大經大法也乃君親之命不可易者其一命也其一義也子之愛親命也不可解於心臣之事君義也無適而非君也莊子誹仁義獨於人之事君以義為主又以死忠為不善今言人臣之事君無往而非君乃忠之盛也此老何曾越世故耶無所逃於天地之間是之謂大戒言世之君親之命無所逃此乃世之大經大法之不易者是以夫事其親者不擇地而安之孝之至也言子之事親無往而非親命則不敢擇地而安之此乃孝之至也夫事其君者不擇事而安之忠之盛也言事君者唯命是聽不敢以難易二其心乃忠之盛也故古人耻二心以事主者自事其心者哀樂不易施乎前言孝則當竭其力忠則盡乎命以盡心盡命為主不以難易推移之志此事心之大者不以哀樂入於心也知其不可奈何而安之若命德之至也言人臣之分知其事之難無可奈何亦不敢二心相視但安之若命安命則忘其難易此乃德之至也為人臣子者固有所不得已行事之情而忘其身言人之臣子固有不得已之事但當盡命以忘其身以從事何暇至於悅生而惡死言臣子盡命而已豈敢以生死為去就哉夫子其行可矣教葉公但當如此而行可矣莊子全書皆以忠孝為要名譽喪失天真之不可尚者獨人間世一篇則極盡其忠孝之實一字不可易者誰言其人不達世故而恣肆其志耶且借重孔子之言者曷嘗侮聖人哉蓋學有方內方外之分在方外必以放曠為高特要歸大道也若方內則於君臣父子之分一毫不敢假借者以世之大經大法不可犯也此所謂世出世間之道無不包羅無不盡理豈可以一槩目之哉丘請復以所聞前槩言君臣父子之分義此下方復言使命之理凡交近則必相靡以信靡順也信符也凡交近國必須符驗則不假辭令遠則必忠之以言若交遠國則必忠之辭令以合二國之歡言必或傳之謂言必要使者口傳夫傳兩喜兩怒之言天下之難者也言之所係安危以之而禍福隨至夫兩喜必多溢美之言兩怒必多溢惡之言病在於溢凡溢之類妄溢美溢惡出於過用智巧故失其本真故曰妄妄則其信之也莫以言不至誠故聽之者亦莫然不信莫則傳言者殃既不相信則罪在傳言者殃矣故法言曰傳其常情無傳其溢言常情乃真實無妄之言則幾乎全庶幾免禍此一節言使命之難以兩家之利害皆在一己擔當若溢而過實則令聽者生疑不信是為生禍之本而傳者必受其殃所以貴乎真實無妄庶幾可保全耳下文申明雖苟全目前之事而終必為害甚矣言之不易不可不謹慎其始也且以巧𨷖力者始乎陽常卒乎陰太至則多奇巧此言慎始慎終之道也且始以巧𨷖力者乃以戲劇相格𨷖也始則兩情相嬉及其過甚則有求勝之心必各用其奇巧奇巧一出則必有一傷傷即認真至不可解則終之以怒矣陽猶喜陰猶怒也以禮飲酒者始乎治常乎亂太至則多奇樂凡事亦然且如飲酒者初則賔主秩然有禮及至酒酣樂劇樂劇則亂必隨之不獨巧𨷖飲酒凡事皆然始乎諒常卒乎鄙諒者不擇是非而必於信鄙詐也且如人之交情始則肝膽相照必信不疑久則鄙詐之心生焉其作始也簡其將畢也必巨不獨人情即作事始作必以簡省為主其將畢也必巨自有不可收拾者蓋勢之必至也言者風波也行者實喪也凡事不能保其始終而言行尤甚蓋言者風波也乃是非所由生行者實之所自發行成而實喪矣故曰言行君子之樞機榮辱之主也故當所必謹者豈可妄乎夫風波易以動實喪易以危風波則易以傾覆實喪則易取殆辱知此則知所慎矣故忿設無由巧言偏辭故凡人忿怒之設實由巧言偏辭以激發之獸死不擇音氣息茀然於是並生心厲茀勃然也厲鬼病也謂巧言偏辭以激怒其人以致怒氣勃然而發則不擇可否而橫出之如獸死之不擇音則使聽者以為實然則並皆心生鬼病而不可治矣尅核太至則必有不肖之心應之而不知其然也謂聽言激怒之人乘其怒氣則於所怒之人必以橫口非理加之毫髮推求不少寬假而尅核之若尅核太至則彼被怒之人亦必以不肖之心應之是則兩家之禍成矣禍雖成而竟不知其所以然也所以然者蓋由巧言偏辭也苟為不知其然也孰知其所終若苟知其巧言之過則尚可解若不知其所由言然則兩家之禍將不知其所終矣故法言曰無遷令無勸成由其巧言偏辭為禍之端害事之甚故奉使者必不可溢言無邊改其令無勸其成免後禍也過度益也凡增益者乃過其度也遷令勸成終必壞事必不可也美成在久惡成不及改可不慎歟凡事不宜速成故美成在久若強勉惡成則不及改矣不可不慎也且夫乘物以遊心托不得已以養中至矣此方教以使命之正道也惟有至人物我兼忘順物之自然以遊心於其間事不可有心以強成當托於不得已而應之以養中正之道而不失其守如此應世可謂至矣何作可報耶莫若為致命此其難者此結乃起語也言使命者何所作為乃可報也莫若致命謂在事之成否自有一定之天命即今奉使又有一定之君命知天命之不可違則當安命順其自然不可用心以溢言僥幸以成功知君命之不可違則不可遷令以勸成以免後禍此所謂致命之意此必至人方能尋常人則不易故曰此其難者此一節言應世之難者無愈使命如葉公之所憂者固然而夫子之言皆使命之至情禍福之樞機切中人情之極致所謂士見危致命者非夫子大聖深於世故者又何以致此哉顏盍將傳衛靈公太子蒯聵也而問於蘧伯玉名瑗衛之賢人孔子之友也有人於此其德天殺去聲降也謂天生低品之人也與之為無方謂不以法度規之也則危吾國與之為有方則危吾身若以法度繩墨之言諫之則必不信而見尤則危吾身其知去聲適足以知人之過而不知其所以過謂其人聰明足以托拾人之過而不知己之過若然者吾奈之何謂其人如此吾將奈何蘧伯玉曰善哉問乎善其問於我也戒之慎之言此人不可輕意犯之者正汝身哉當先正己而後事之形莫若就言其人狠戾不可逆之宜將順其美而後救其惡心莫若和言中心不可以不善而逆之故莫若和雖然之二者有患雖然形就心和亦未免患形就將與己同心和則將為悅己以此縱之則不敢以規諫故有患就不欲入言形雖就不可全身放倒也和不欲出出者謂顯己之長形彼之短故不欲出形就而入且為顛為滅為崩為蹶若放身阿諛承順其惡則返成其惡將取顛滅崩蹶之禍心和而出且為聲為名為妖為孽若少露圭角則彼將以己之惡而收為聲名其心必忌之而為妖孽矣故此二者皆有患也彼且為嬰兒亦與之為嬰兒嬰兒言彼無知識也彼且為無町畦亦與之為無町畦町畦言無牆塹謂全無檢束也彼且為無崖亦與之無崖崖謂無崖岸言放蕩無拘也達之入於無疵言先且於一切舉動不可一毫有逆其意待彼久久相信而不疑則漸漸因事引達以入無過之地此正所謂將順其美匡救其惡可無患也汝不知夫螳螂乎怒其臂以當車轍不知其不勝任也此喻不量力而逆之也螳螂怒臂以當車轍其志則似矣而不知其力不勝任也是其才之美者也言螳螂恃其才之美者但不量己力耳謂盍才雖美至若盡力以事暴君恐不免其患也戒之慎之積伐而美者以犯之幾矣言汝積伐己之美才而挺身以犯暴君之難若螳螂之怒臂其不免於死者幾矣可不戒慎之哉汝不知夫養虎者乎不敢以生物與之為其殺之之怒也若以生物則長其殺心不敢以全物與之為其决之之怒也全物與之則令虎决裂而生其怒也虎怒則發威猛而不可制矣時其饑飽達其怒心虎之與人異類而媚養己者順也故其殺者逆也養虎而不知順其性則被其殺無疑矣夫愛馬者以筐盛矢矢即糞也以蜄盛溺尿也適有蚉虻僕緣而拊之不時則銜則怒而斷其銜勒也毀首碎𦚾言馬之怒則毀碎胸首之絡轡也意有所至而愛有所亡言雖愛馬之至若拊之不時一觸其怒則將斷勒毀轡矣又何顧其愛哉可不慎耶愛馬之喻尤切事情三喻乃事暴君之大戒也此言輔君之難也已上三者皆人間世之難者意謂夫遊人間世者必虛心安命適時自慎無可不可乃可免患若不能虛心恃知妄作無事而強行者顏回是也若不能安命多憂自苦當行而不行者葉公是也二者皆非聖人所以涉世之道而當以孔子之言為凖也若其必不得已而應世以事人主必將順其美匡救其惡以竭其忠尤當以戒慎恐懼達變知機不可輕忽不可恃才輕觸以取殺身之禍此又當以蘧伯玉之言為得也涉世人情之曲折極盡於此矣是必取重仲尼伯玉乃可免患耳上言材能之纍下以不才以全生匠石之齊至乎曲轅地名見櫟社樹其大蔽牛潔之以兩手挈之百圍其高臨山十仞而後有枝言樹身分之長大也其可以為舟者旁十數言正身之外旁枝可為舟者有十數也觀者如市人以為大且美故觀之者衆匠伯不顧遂行不輟止也謂不顧其樹而行不止也弟子厭飽足也觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肻視行不輟何耶曰已矣勿言之矣散木也以為舟則沉以為棺槨則速腐以為器則速毀以為門戶則液樠謂門樞引水則液樠然而泚以為柱則蠹是不材之木也無所可用故能若是之壽匠石歸櫟社見夢曰汝將惡乎比豫哉若將比豫於文木耶夫柤梨橘柚果蓏之屬實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭自掊擊言掊取而擊折之也於世俗者也物莫不若是且豫求無所可用久矣幾死乃今得之幾死者謂尋常人不知我不材幾乎被伐者數矣今幸而得全為豫大用以不材全生為我大用使豫也而有用且得有大也耶若使我有用必不能此之大也且也若與豫也皆物也奈何哉其相物也言汝與我同為天地間之一物耳奈何汝恃有用而以我為無用耶而幾死之散人又惡知散木言汝乃幾死之散人而不自知且又鄙我為散木是自不知量也匠石覺而診其夢覺而為弟子說其夢弟子曰趣取無用趣乃意趣猶言意思也謂意思取無用而為社者何也則為社何耶曰密若無言謂汝不必聲說也彼亦直寄焉然直是以社寄於此木非是此木有心要作社也以為不知己者詬厲也謂常人不知寄托之意遂以此木真真是社以此名而誣害之也不為社者且幾有剪乎言此木即不為社又豈有剪伐者乎且也彼其所保與衆異而以義譽之謂彼木所以保其天年者以不材而全生故與衆異而人不知乃以利人長物禁暴除非之義譽之不亦遠乎此言櫟社之樹以不材而保其天年全生遠害乃無用之大用返顯前之恃才妄作要君求譽以自害者實天壤矣此莊生輕世肆志之意正在此耳下歷言無自全之意以喻己志此立言之指也南伯子綦遊乎商之丘見大木焉有異謂有異於衆木結駟千乘隱將笓其所藾言千駟之車馬隱息于樹下而樹之枝葉皆能芘蔭之也子綦曰此何木也哉此必有異材不知其不材故異之也夫仰而視其細枝則拳曲而不可以為棟梁俯而視其大根則軸解言木身之解散也而不可以為棺槨咶其葉則口爛而為傷嗅之則使人狂醒三日而不已言葉之惡氣薰人令人狂醒如醉而不醒也子綦曰此果不材之木也以至於此其大也嗟夫神人以此不材言子綦因試知其木不材乃知神人以不材無用而致聖也宋有荊氏者宜楸柏桑其拱把而上者求猿狙之杙取猿狙之具也者斬之三圍四圍求高名之麗屋棟也者斬之七圍八圍貴人富商之家求樿傍乃棺木之全傍邊也者斬之故未終其天年而中道之夭於斧斤此材之患也此甚言材之為害以見不材之得全也故解之解者祭祀解賽也古者天子有解祠謂解罪求福也出漢書郊祀記以牛之白顙言色不純也者與豚之亢鼻言形不美者與人之有痔病者不可以適河以人祭河謂人為巫祝也又漢書有為河伯娶婦選童男女之美者投之河中謂之適河此事或古亦有之此皆巫祝以知之矣所以為不祥也言此三者小有不材足以全生况神人以無用而自全者乎此乃神人之所以為大祥也此極言不材之自全甚明材美之自害也惟神人知其材之為患故絶聖棄智昏昏悶悶而無意於人間者此其所以無用得以全身養生以盡其天年也此警世之意深矣支離疏者此假設人之名也支離者謂隳其形疏者謂泯其智也乃忘形去智之喻頤口傍兩頤也隱於臍肩高於頂兩頤隱於臍則其背僂可知會撮髮髻也指天言背僂而項仰也五管在上謂五臟之腧隨背而在上也兩髀為脅髀大腿也言大腿為兩脅則形曲可知挫針縫衣也治繲浣衣也足以糊口鼓䇿播精言簸米出糠稗也此就其形之曲戾而可為之事也足以食十人言形曲簸米則有力故取值多可以食十人也上徵武士則支離攘臂於其間言形既支離故不畏其選故攘臂於其間上有大役則支離以有常疾不受功言大役難免而支離又以疾免上與病者粟則受三鍾與十束薪言以疾則多得其賜夫支離其形者猶足以養其身終其天年又況支離其德者乎此言支離其形足以全生而遠害況釋智遺形者乎此發揮老子處衆人之所惡故幾於道之意前以木之材不材以況此以人喻亦更切矣孔子適楚楚狂接輿遊其門曰鳳兮鳳兮何如德之衰也來世不可待往世不可追也天下有道聖人成焉言天下有道則成聖人之事業也天下無道聖人生焉言天下無道則聖人全生而已方今之時僅免刑焉言方今之時僅能免害足矣何敢言功福輕乎羽莫之知載言福之自取甚易而又不肻受禍重乎地莫之知避言世人之迷禍以求利也已乎已乎言自嘆其當止也臨人以德殆乎殆乎殆者危而不安也言方今之時若以德臨人以才自用其危之甚也畫地而趨迷陽迷陽無傷吾行言方今之人畫地而趨者迷昧之甚也豈能效之而行哉行則有傷吾之固有也吾行卻曲言行不進貌無傷吾足言世道難行若行之適以傷吾之足耳山木自寇也山以生木自取寇斫也膏火自煎也膏以明故自煎耳桂可食故伐之桂以可食故早伐也漆可用故割之漆以澤故自取割之人皆知有用之用而莫知無用之用也此人間世立意初則以孔子為善於涉世之聖故托言以發其端意謂雖顏子之仁智亦非用世之具不免無事強行之過也次則葉公乃處世之人亦不能自全況其他乎次則顏盍乃一隱士耳爾乃妄意干時乃不知量之人也故以伯玉以折之斯皆恃才之過也故不免於害故以櫟社山木之不材以喻之又以支離疏曉之是涉世之難也如此故終篇以楚狂譏孔子意謂雖聖而不知止以發己意乃此老披肝露膽真情發現真見處世之難如此故超然物外以道自全以貧賤自處故遁世無悶著書以見志此立言之本意也故于人間世之末以此結欵實自敘也德充符此篇立意謂德充實於內者必能遊於形骸之外而不𥨊處軀殼之間蓋以知身為大患之本故不事於物欲而心與天遊故見之者自能神符心會忘形釋智而不知其所以然也故學道者唯務實德充乎內不必計其虛名見乎外雖不求知於世而世未有不知者也故引數子以發之蓋釋老子處衆人之所惡故幾於道之意也魯有兀即介字乃刖足之人也者王台從之遊者與仲尼相若常季問於仲尼曰王台兀者也從之遊者與夫子中分魯言魯國從王台遊者與夫子相半也立不教坐不議虛而往實而歸固有不言之教無形而心成者邪謂教人不見於形容言語而但以心相印成者耶是何人也仲尼曰夫子聖人也丘也直後而未往耳謂直居其後未能往向於前耳丘將以為師此重言孔子未能忘形師心之意而況不若丘者乎奚假魯國丘將引天下而與從之此形容孔子無我之意常季曰彼兀者也而王音旺言勝也先生其與庸亦遠矣若然者其用心也獨句言不同於人也若之何仲尼曰死生亦大矣而不得與之變不為死生之所遷變雖天地覆墜亦將不與之遺言雖天地覆墜之變亦不為之所遺纍也審乎無假而不與物遷審處也無假謂形骸之外至真之道超然出於萬物之表故不為物遷命猶名也物之化而守其宗也謂其人超然物外不隨物遷唯任物自化而彼但守其至道之宗也常季曰何謂也常季不解其不遷之說仲尼曰夫子示之以忘形守真之旨自其異者視之肝膽楚越也言不能忘形見道者雖一身之肝膽猶楚越之相遠也自其同者視之萬物皆一也自大道觀之萬物與我皆一體也夫若然者且不知耳目之所宜形骸既忘六根無用故泯其見聞故不知耳目之所宜而遊心乎德之和謂超乎形骸之外而遊心於大化之鄉太和元氣之境物視其所一而不見其所喪物人也以彼處乎大化之中故人但見其道真之所存故不見其形之有所喪視喪其足猶遺土也言視喪其足若與己無干猶遺土也常季曰彼為己止也言止於如此而已也以其知得其心謂彼不過以其所知得其自己之心耳以其心得其常心言即彼所得之心亦尋常人之心耳物何為最之哉言彼所得之心亦人人皆有又何有越過人之心哉仲尼曰人莫鑑於流水而鑑於止水惟止能止衆止夫子言人人雖皆有此心但衆人之心忘動如流水而聖人之心至靜如止水故衆人之心動而不止唯聖人能為與止之耳受命於地惟松柏獨也在句冬夏青青言獨者乃天地真一之氣雖萬物之多而此真一之氣獨在松柏受命於天惟舜獨也正句幸能正生以正衆生言受命於天惟舜得天之正乃各正性命之正故為正人以其自正故能正衆人之不正者夫保始之徵不懼之實始者受命之元即所謂大道之宗也言保始即上文守宗乃守道之人也其守道之徵驗惟不懼是其實效耳勇士一人雄入於九軍將求名而能自要者而猶若是以勇士不懼以比有道者之不懼而況官天地聖人為天地之宰府萬物會萬物歸一己直寓六骸假借六根象耳目耳目如偶人所謂如幻也一知之所知知萬化為一致而心未嘗死者乎死猶喪失也謂衆人喪失本真之心唯聖人未喪本有故能視萬物為一己也彼且擇日而登假假猶遐也謂彼人且將擇日而登遐遠升仙界而超出塵凡也人則從事也言人之相從者蓋從於形骸之外也彼且何肻以物為事乎此篇以德充符為名首以介者王駘發揮只在末後數語便是實德內充故符於外而人多從之非有心要人從之也蓋忘形骸一心知即佛說破分別我障也能破分別我障則成阿羅漢果即得神通變化今莊子但就人中說老子忘形釋智之功夫即能到此境界耳即所謂至人忘己也此寓六骸象耳目一知之所知即佛說假觀乃即世間出生死之妙訣正豫所謂修離欲禪也申屠嘉兀者也而與鄭子産同師於伯昏無人此亦撰出其人名蓋從老子衆人昭昭我獨若昏故以昏為聖人之名子産謂申屠嘉曰我先出則子止子先出則我止此重言子産不能忘我以功名自矜故耻與介者為伍故止其不與同出入也其明日又與合堂同席而坐言申屠嘉自忘其介而亦不知子産之厭己也子産謂申屠嘉曰我先出則子止子先出則我止今我將出子可以止乎其未耶且子見執政而不違回避也子齊執政乎子産見申屠嘉之不避己故明言之然以執政矜人則形容子産之陋也申屠嘉曰先生之門固有執政焉如此哉申屠嘉鄙子産之陋乃曰先生之門固有此不能相忘之人哉子而說子之執政而後人者也言子但知有己之執政故以人不若己者此陋之甚也聞之曰鑑明則塵垢不止止則不明也久與賢人處則無過今子之所取大者先生也而猶出言若是亦不過乎此譏子産之不明也蓋聞老子自知者明之意笑子産不自知也意謂子産既遊聖人之門而猶發言如此足見無真學問也子産曰子既若是矣子産言申屠之廢人而不能自反而與人爭善猶與堯爭善計子之德不足以自反耶德猶見識也謂申屠嘉既廢如此而不自反求諸己而猶且以聖自居將與堯爭善我計料子之知見誠愚而不自反也子産畢竟露出本來面目申屠嘉曰自狀其過以不當亡者衆狀者言自知己過之分明也謂若人能自知己過則人之過更有甚於我者如此見恕則以我之足不當忘者衆矣不狀其過以不當存者寡此句義似不順當去一不字意謂若人不自狀其己過則責我太過則以我足當者寡矣知不可奈何而安之若命惟有德者能之若知我無可奈何而命之使然如此知命相忘乃有德能之耳遊於羿之彀中中央者中地也然而不中者命也羿之善射而人遊於必中之地不被射而死者亦幸而免耳以喻世人履危機當禍而免者亦幸耳謂我以不幸而不免者豈非命之有在耶人以其全足笑吾不全足者衆矣我佛然而怒言始也人笑我以足不全我則怫然如怒而適先生之所則廢然而反言初未聞道故未忘人我今自入先生之門一聞大道則人我之見盡廢亡矣不知先生之洗我以善耶言不自知其先生洗我以善也吾與夫子遊十九年矣而未嘗知吾兀者也我與先生遊十九年向未知我之亡足也今子與我遊於形骸之內而子索我於形骸之外不亦過乎言我與子相知以心即當相忘以道不當取於形骸之間今子乃以形骸外貌索我不亦過乎子産蹴然改容更貌曰子無乃稱子産聞說則中心愧服而謝之曰子無乃稱謂再不必言也此章形容聖人忘功故以子産發之蓋實德內充形骸可外而安命自得以道相忘則了無人我之相此學道之成效也魯有兀者叔山無趾踵見仲尼曰子不謹前既犯患若是矣雖今來無及矣無趾曰吾惟不知務務謂務學道也而輕用吾身吾是以亡足今吾來也猶有尊足者存尊足蓋指性而言也吾是以務全之也夫天無不覆地無不載吾以夫子為天地安知夫子之猶若是也無趾自以所全者性真而夫子猶以形骸取之初以夫子為聖人之大不無不容不知其猶若此之區區也孔子曰丘則陋矣夫子胡不入乎請講以所聞夫子聞無趾之言知其為有道者故請入願講其所聞無趾出孔子曰弟子勉之夫無趾兀者也猶務學謂務學道也以補前行之惡而況全德猶全體也之人乎無趾語老聃曰孔丘之於至人其未耶彼何賔賓以學子為言初以孔丘為至人今見其未至也如此之見識何以賔賓恭謹以學子為彼且蘄以諔詭幻怪之名聞不知至人之以是為己桎梏耶桎梏乃拘手足之刑言孔子專求務外之名聞而不務實彼殊不知虛名乃諔詭幻怪之具非本有也如桎梏之於手足拘之而不得自在者也老聃曰胡不使彼以死生為一條以可不可為一貫者解其桎梏其可乎可不可謂善惡是非也一條即一貫也老子謂無趾何不以無死生忘善惡之道以告之以解其好名之桎梏乎無趾曰天刑之安可解刑舊注作型乃上模也此譏孔子乃天生成此等務名之人安可解乎此章發揮聖人忘名故以孔子為務虛名而不尚實德之人故取人於規規是非善惡之間殊不知至人超乎生死之外而視世之浮名為桎梏蓋未能忘死生一是非故未免落於世之常情耳聖人則不以此為得也魯哀公問於仲尼曰衛有惡人焉謂醜貌之人也曰哀駘它丈夫與之處者思而不能去也言男子與之相處則不忍捨去婦人見之請於父母曰與為人妻寧為夫子妾者十數而未止也言婦人見之而皆願為之妾者不止一人也未嘗有聞其唱者也謂未有所長而先見聞於人者也常和而已矣亦秪見隨於庸衆人而已無人君之位以濟乎人之死言無勢位以濟人之死無聚祿以望人之腹望猶月望之望謂飽滿也言無位聚祿以周給於人以飽人之腹又以惡駭天下既無利濟於人且又醜貌以駭天下之人和而不唱言一向隨人自無專能知不出乎四域言無超出世間常人之見識且而雌雄合乎前雌雄猶言爭勝負也謂凡人之是非勝負不決者皆取決其人言此事常合在前是必有異乎人者也言貌醜而人從之者衆必有異乎人之所為者也寡人召而觀之果以惡駭天下及召而觀之果然醜貌不見其所長與寡人處不至以月數而寡人有意乎其為人也及相處月數則見其有可愛處但未盡知耳不至乎期年寡人信之不期年則信之深矣國無宰宰即宰相掌一國之政事寡人傳國焉言以國事授之也悶然而後應悶然若不恱其事也汜而若辭汜謂泛然不經心而若辭也寡人醜乎言見彼之不在意故自愧醜也卒授之國無幾何去寡人而行寡人恤焉若有亡也言恤其去若已有所亡失也若無與樂是國也察其人之意蓋不以國為樂也是何人者耶謂不知是何等之人也使我愛之如此仲尼曰丘也嘗使於楚矣適見㹠子食於其死母者少焉眴若見死母之目不瞬也皆棄之而走不見己焉爾謂母之目不見己也不得類焉爾言形僵不同前者之食於母故皆棄之而走也所愛其母者非愛其形也愛使其形者也形者假物也使其形者真宰也言㹠之子母乃天性之愛也往日食於母何嘗不愛及今才死始則就之而食及見目之不瞬則知精神不在故棄之而走是則死生不遠即棄之而走是知所愛者非形骸乃愛使其形骸之真宰也雖物之至愚尚知愛其天真而況於人乎戰而死者其人之葬也不以翣資翣古訓纛乃大將之旗也戰而死者以此為送葬之儀言已失其勇又無其尸似以此虛儀為葬資則無其本矣刖者之屨無為愛之言刖者無足趺而履亦無可用皆無其本也以翣資刖屨為無本之喻意謂真可愛者在本也為天子之諸御不剪爪不穿耳言選天子之侍御者不剪爪不穿耳不欲毀其全體將以要寵也娶妻者止於外不得復使言新婚之婦必先戒不作事務恐胼胝其手足也形全猶足以為爾而況全德之人乎言天子之御新婚之人不如此不足以要寵結歡但全其形尚如此況全德之人乎言魯君之愛駘它蓋忘形愛其形之本也有難以言語形容者故夫子連以三事喻其可愛之在本今哀駘它未言而信無功而親使人授己國惟恐其不受也言哀駘它未與魯君一語而見信若此且無功即授之以國惟恐其不受豈無謂哉是必才全而德不形者也哀公曰何謂才全言才者謂天賦良能即所謂性真莊子指為真宰是也言才全者謂不以外物傷𢦤其性乃天性全然未壞故曰全仲尼曰死生存亡窮達貧富賢與不肖毀譽饑渴寒者是事之變命之行也仲尼言才全而先言此十六事者蓋此諸事皆𢦤生傷性之事變而世人未有不被其傷損其性真者故先言之日夜相代乎前此十六事人生於世日夜相代於前未嘗暫免者是皆𢦤生傷性之具也而知不能規乎其始者也言上十六事日夜相代而以知規規求之不知所由來蓋達其性真本不涉其變故不足以滑和滑音汩謂汩溺也和謂本元中和之體也言以上諸事雖常情之變但了其本無故不足以汩和不可入於靈府靈府所謂靈臺言諸變不可以搖動其性也使之和豫通而不失於兊和者即中和之和謂性真達於事變渾然而不失其體也豫者安然自得而恱豫也通者謂達於事變而不滯也兊者即老子玄牝之門謂虛通應物而無跡者也言真人所以才全者蓋保其性真而不失也使日夜無卻而與物為春卻亦作隙謂縫呼也言真人之一性綿綿日夜無隙未嘗間斷但於應物之際春然和氣發現令人煦然而化也是接而生時於心者也時者謂接物應機時行時止與物俱化未嘗逆也若夫愚人則與接為搆矣是謂之才全此言真人應物一味性德流行無一息之間故謂之言全何謂德不形此哀公問也曰平者木停之盛也其可以為法也內保之而外不蕩也德者謂性之德用也以性德之用難以言語形容故以水平為喻蓋言水之平者乃停之盛謂湛淵澄靜之至故可以取法為凖言性體湛淵澄渟寂然不動則虛明朗鑑乃內保之而外境不蕩為守宗保始之喻謂性靜虛明則可以鑑物為用也德之成和之修也言虛明朗鑑乃德之成蓋從中和用功修而後得者非漫然也德不形者物不能離也不能離者謂與物混一而不分故人但見其物之變而不知性之真故其德不易形著於外所以人但見其貌惡而不識其才德之全耳觀孔子對哀公之言發明中庸和也者天下之達道之意何等正大精確哀公異日以告閔子曰始也吾以南面而君天下執民之紀而憂其死吾自以為至通矣言自以為至通於道也今吾聞至人之言恐吾無其實輕用吾身而亡吾國吾與孔丘非君臣也德友而已矣此章形容聖人之德必須忘形全性體用不二內外一如平等湛一方為全功故才全德不形為聖人之極致蓋才全則內外不二德不形則物我一如此聖人之成功所以德充之符也故魯君聞之亦能忘分感化而友於聖人也闉跂曲跂也支離形不全也無脤無臀也說衛靈公靈公說之而視全人其脰頸也肩肩細小貌甕㼜大癭言癭如甕㼜也說齊桓公桓公說之而視全人其脰肩肩故德有所長而形有所忘言二子醜惡之狀而使二君說之反視為全人之不如者蓋愛其德故自忘其形也人不忘其所忘所忘者性也言世人迷性真而愛形骸故忘其性今欲不忘而忘其所不忘所不忘者形也世人忘性而愛形故今欲忘之此謂誠忘忘其所愛而不忘其所不愛此之謂誠忘故聖人有所遊聖人遊於大道之鄉而忘其物欲而知為孽知者以智巧揣摩人心謂之知孽妖孽也約為膠以仁義結束人心謂之約膠固結而不解也德為接以小惠要買人心謂之德接應接於人也工為商以機關罔取人之利謂之工工猶技巧也商行貨之人也聖人不謀惡用智不斷惡用膠無喪惡用德不貨惡用商四者皆僞以喪真淳故聖人去之以全天德四者天鬻也謂四者淳德乃天德也鬻猶售也四德乃天售即所謂天爵是也天鬻也者天食也謂天既售我以天德則天之所以食我也又何取於人僞哉既受食於天又烏用人言天生我性德自有天然之受用又何以人僞求之有人之形無人之情言聖人雖居人世其形雖似人而絶無人之情有人之形故群於人其形為人故群於衆人之之中無人之情故是非不得於身以形寄人中心超物外不以物為事故無人世之是非眇乎小哉所以屬於人也人在太虛中乃萬物之一數耳其最眇小者又何足以愛之謷乎大哉獨成其天謷者謷然超於物表也言性德廣大全此天德故由人而入於天前雖以知忘形而知尚存未盡道妙故此一章以忘忘知知忘則德自化方能合乎自然以全天德其德乃充故如二君之見二子能不見其形此所以為德之符也聖人造道之極致至此方為究竟耳故以此結一篇之義惠子謂莊子曰人故無情乎借惠子之問以結者因上文發揮天德之全者乃絶情欲去人僞心與天游乃能充實其天德故恐世人將謂絶情則非人類矣故假惠子以發之故乃故有之故謂本來無情耶莊子曰然莊子直然其問者蓋約人性本來離情絶欲故直然之惠子曰人而無情何以謂之人惠子意謂世人若無其情則非人也此俗人之常見也莊子曰道與之貌天與之形惡得不謂之人道者性之固有人之所當行也人稟此性而為人乃道與之貌即天與之形也既有此性豈非人乎惠子曰既謂之人惡得無情此惠子全不知道理與常人所見一般謂既是箇人豈得無情者乎莊子曰是非吾所謂情也吾所謂無情者言人之不以好惡內傷其身常因其自然而不益生也惠子意謂必有情欲乃可為人故以無情不得為人為問莊子以正義答之曰我所謂無情者非絶無君親父子夫婦之情也蓋因世人縱情肆欲以求益生而返傷其生故我要絶其貪欲之情耳非是絶無人倫也惠子曰不益生何以有其身惠子又以為人生必欲養其口體乃可以有其身此全是常人之識見耳莊子曰道與之貌天與之形無以好惡內傷其身莊子意謂人既道與之貌天與之形矣苟無以好惡內傷其身如此則全生養身之至道又何庸益生為哉今子外乎子之神勞乎子之精倚樹而吟據槁梧而暝槁梧琴也乃惠子倚樹據琴而暝以辨論也莊子意謂惠子不能樂其天德而返外其精神而倚樹據梧以逞辨論是非也天選子之形子以堅白鳴謂天選子之形賦以全德今乃捨之而返恣堅白之論以自鳴失之甚矣此篇以忘情絶欲以全天德故其德乃充前已發揮全德之妙故結以無情非人以盡絶情全德之意所以警俗勵世之意深矣音釋音欵空也軱攻乎切音姑大骨也謋霍虢切音砉謋然速也蜄音腎大蛤可為盛器樠模昆切音門脂出樠然也柤莊加切詐平聲以木為闌也診止忍切音軫占也藾盧蓋切音賴蔭芘也咶善指切音視與䑛同杙夷益切音弋所以格獸也樿㫖善切音顫棺木之全一邊者繲居隘切音懈浣衣也翣色甲切音喋棺羽飾又纛也謷牛刀切音敖大貌
