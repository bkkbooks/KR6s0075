body:
  text: 明匡廬逸叟憨山釋德清注莊子一書乃老子之注疏子嘗謂老子之有莊如孔之有孟若悟徹老子之道後觀此書全從彼中變化出來以其人宏才博辨其言洸洋自恣故觀者如捕風捉影耳直是見徹他立言主意便不被他瞞矣一部全書三十三篇只內七篇已盡其意其外篇皆蔓衍之説耳學者但精透內篇得無窮快活便非世上俗人矣其學問源頭影響論發明已透請細參之逍遙遊此為書之首篇莊子自云言有宗事有君即此便是立言之宗本也逍遙者廣大自在之意即如佛經無礙解脫佛以斷盡煩惱為解脫莊子以超脫形骸泯絶知巧不以生人一身功名為纍為解脫蓋指虛無自然為大道之鄉為逍遙之境如下云無何有之鄉廣漠之野等語是也意謂唯有真人能遊於此廣大自在之場者即下所謂大宗師即其人也世人不得如此逍遙者只被一箇我字拘礙故凡有所作只為自己一身上求功求名自古及今舉世之人無不被此三件事苦了一生何曾有一息之快活哉獨有大聖人忘了此三件事故得無窮廣大自在逍遙快活可悲世人迷執拘拘只在我一身上做事以所見者小不但不知大道之妙即言之而亦不信如文中小知不及大知等語皆其意也故此篇立意以至人無己聖人無功神人無名為骨子立定主意只説到後方才指出此是他文章變化鼓舞處學者若識得立言本意則一書之旨了然矣北冥北海乃玄冥處也有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名為鵬鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南冥南冥者天池也莊子立言自云寓言十九重言十七巵言日出和以天倪一書之言不出三種若此鯤鵬皆寓言也以托物寓意以明道如所云譬喻是也此逍遙主意只是形容大而化之之謂聖惟聖人乃得逍遙故撰出鯤鵬以喻大而化之之意耳北冥即北海以曠遠非世人所見之地以喻玄冥大道海中之鯤以喻大道體中養成大聖之胚胎喻如大鯤非北海之大不能養也鯤化鵬正喻大而化之之謂聖也然鯤雖大乃塊然一物耳誰知其大必若化而為鵬乃見其大耳鵬翼若垂天之雲則比鯤在海中之大可知矣怒而飛者言鵬之大不易舉也必奮全體之力乃可飛騰以喻聖人雖具全體向沉於淵深靜密之中難發其用必須奮全體道力乃可捨靜而趨動故若鵬之必怒而後可飛也聖人一出則覆翼群生故喻鳥翼若垂天之雲此則非鯤可比也海運謂海氣運動以喻聖人乘大氣運以出世間非等間也將徙徙者遷也南冥猶南明謂陽明之方乃人君南面之喻謂聖人應運出世則為聖帝明王即可南面以臨蒞天下也後之大宗師即此之聖人應帝王即徙南冥之意也所謂言有宗事有君者正此意也齊諧者志怪者也諧之言曰鵬之徙於南冥也水擊三千里搏扶搖而上者九萬里去以六月息者也莊子意謂鯤鵬變化之説大似不經恐人不信故引此以作證據謂我此説非是漫談乃我得之於齊諧中也問曰齊諧是何等書曰乃志怪之書所記怪異之事者也故諧之有言曰鵬之徙於南冥也水擊三千里言翼擊海水振蕩三千里則其大可知扶搖大風也以翼搏大風以飛而上者一舉而九萬里之遠則其大益可知已六月周六月即夏之四月謂盛陽開發風始大而有力乃能鼓其翼息即風也意謂天地之風若人身中之氣息此筆端鼓舞處以此證之則言可信也野馬也塵埃也生物之以息相吹也天之蒼蒼其正色耶其遠而無所至極耶其視下也亦若是則已矣此言大而又大之意也野馬澤中陽𦦨不實之物塵埃日光射隙以照空中之遊塵生物以息相吹言世之禽鳥蟲物以息相吹謂氣息之微也蒼蒼者非天之正色乃太虛寥遠目力不及之地也意謂鵬鳥之大可謂大矣然在太虛寥廓之上而下視之一似野馬塵埃而已眇乎小哉即扶搖之大風以鼓之亦若生物之以息相吹相噓而已何有於大哉故曰其視下也亦若此已矣意謂聖人之大雖大亦落有形尚有體𫨻而虛無大道無形不可以名狀又何有於此哉此即以聖人之所以逍遙者以道不以形也且夫水之積也不厚則負大舟也無力覆杯水於坳堂凹處也之上則芥為之舟謂芥子大舟也置杯焉則膠膠粘著也謂坳堂之上不過杯水止可以芥子大舟則浮若以杯為舟則膠粘不動矣水淺而舟大也風之積也不厚則其負大翼也無力故九萬里則風斯在下矣謂鵬能一飛九萬里者則是風在下而鵬在上鼓之負之乃可遠舉若風小則無力不能舉矣而後乃今培風背負青天大風在下大鵬培在風上使得背負青天乃不墮落而莫之天閼者天中道而折也閼壅滯而不行也言得此大風培送大鵬一舉九萬里遠直至南溟而不中路夭折壅滯也而後乃今將圖南言必有此大風然後方敢遠謀圖南之舉風小則不敢輕舉也此一節總結上鯤鵬變化圖南之意以暗喻大聖必深畜厚養而可致用也意謂北海之水不厚則不能養大鯤及鯤化為鵬雖欲遠舉非大風培負鼓送必不能遠至南冥以喻非大道之淵深廣大不能涵養大聖之胚胎縱養成大體若不變化亦不能致大用縱有大聖之作用若不乘世道交興之大運亦不能應運出興以成廣大光明之事業是必深畜厚養待時而動方𥁞大聖之體用故就在水上風上以形容其厚積然水積本意説在鯤上今不説養魚則變其文曰負舟乃是文之變化處使人捉摸不住若説在鯤上則板拙不堪矣意笑世人輕薄淺陋口耳之學又無積德深厚何敢言其功名事業也蜩小寒蟬也與鷽鳩學飛之小鳩也笑之曰我決起盡力而飛也而飛搶撞也榆枋時則不至而控投也於地而已矣奚何也以九萬里而南為適往也莽蒼一望之地也者三餐而反腹猶果實也謂尚飽也然適百里者宿春糧適千里者三月聚糧之二蟲又何知此喻小知不及大知謂世俗小見之人不知聖人之大猶二蟲之飛搶榆枋則已極矣故笑大鵬要九萬里何為哉此喻世人小知取足一身口體而已又何用聖人之大道為哉莊子因言世人小見不知聖人者以其志不遠大故所畜不深厚各隨其量而已故如往一望之地則不必畜糧一飯而往返尚飽此喻小人以目前而自足也適百里者其志少遠故隔宿舂糧若往千里則三月聚糧以其志漸遠所養漸厚比二蟲者生長榆枋本無所知亦無遠舉之志宜乎其笑大鵬之飛也舉世小知之人蓋若此小知不及大知以上二蟲以喻小知之人小年不及大年此以小年大年又比小知大知也奚以知其然耶朝菌糞壤之菌朝生夕枯不知晦朔一月也蟪蛄夏蟲也不知春秋此小年也楚之南有冥靈神龜也者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋此大年也而彭祖有壽之人乃今以久壽也特獨也聞衆人匹之不亦悲乎此因二蟲之不知大鵬以喻小知之人不知聖人之廣大以各盡其量無怪其然也如朝菌蟪蛄豈知有冥靈大椿之壽哉且世人只説彭祖八百歲古今獨有一人而衆人希比其壽以彭祖較大椿則又可悲矣世人小知如是而已湯之問𣗥湯之賢相也也是已言小知不及大知即湯之問𣗥便是此事也窮髮不毛之地也之北有冥海者天池也要顯北冥南冥都是海故此著天池字有魚焉其廣數千里未有知其修長也者其名為鯤有鳥焉其名為鵬背若泰山翼若垂天之雲搏扶搖羊角旋風也而上者九萬里絶雲氣雲在半空而鵬飛負天故云絶雲氣負青天然後圖南且適南冥也斥鷃斥澤名鷃澤中之小鳥也笑之曰彼且奚適也我騰躍而上不過數仞七尺曰仞而下翱翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辨也前引齊諧以證鯤鵬之事此復引湯之問𣗥以證小知大知之事言上説小知不及大知之説即湯之曾問於𣗥者便是此事然且即舉鯤鵬不但證其魚鳥之大抑且證明小大之辨故一引而兩證之其事同而意別也故下文即明小大之不同故夫故夫者承上義而言也知效一官行比用也一鄉德才也合一君而徵所信也一國者其自視亦若此矣亦若斥鷃之自足也而宋榮子猶然笑之宋榮子宋之賢人也笑謂彼四等人汲汲然以才智以所一己之浮名者且舉世而譽之而不加勸舉世而非之而不加沮沮喪氣失色也定乎內外之分辨乎榮辱之竟斯已矣言宋榮子所以笑彼汲汲於浮名者其自處以能忘名故舉世譽之而不加勸舉世非之而不加沮此但定其內之實德在己外之毀譽由人故不以毀譽少動其心以知榮辱與己無預如此而已矣彼其於世未數數然也言宋榮子所以能忘毀譽者但不汲汲以求世上之虛名耳雖然猶有未樹也言未有樹立也以但能忘名未忘我夫列子御風而行冷然輕舉貌善也旬有五日而後返彼於致福者未數數然也此雖免乎行猶有所待者也列子雖能忘禍福未能忘死生以形骸未脫故不能與造物遊於無窮故待風而舉亦不過旬五日而即返非長往也若夫乘天地之正正天地之本也如各正性命之正而御六氣之辨乘天地則宇宙在手六氣者陰陽風雨晦明乃造化之氣也御六氣則造化生乎身是乘大道而遊者也以遊無窮者彼且惡乎待哉彼聖人乘大道而遊與造化混而為一又何有待於外哉故曰至人無己神人無功聖人無名至人神人聖人只是一箇聖人不必作三樣看此説能逍遙之聖人也以聖人忘形絶待超然生死而出於萬化之上廣大自在以道自樂不為物纍故獨得逍遙非世之小知之人可知也莊子立言本意謂古今世人無一得逍遙者但被一箇血肉之軀為我所纍故汲汲求功求名苦了一生曾無一息之快活且只執著形骸此外更無別事何曾知有大道哉唯大而化之之聖人忘我忘功忘名超脫生死而遊大道之鄉故得廣大逍遙自在快樂無窮此豈世之拘拘小知可能知哉正若蜩鳩斥鷃之笑鯤鵬也主意只是説聖人境界不同非小知能知故撰出鯤鵬變化之事驚駭世人之耳目其實皆寓言以驚俗耳初起且説別事直到此方拈出本意以故曰一句結了此乃文章機軸之妙非大胸襟無此氣槩學者必有所養方乃知其妙耳此上乃寓言下乃指出忘己忘功忘名之聖人以為證據堯讓天下於許由堯以治天下為己功今讓與許由乃見忘己忘功之實曰日月出矣而爝火堯自喻爝火以許由比日月不息其於光也不亦難乎爝火之光難比日月時雨降矣以比許由而猶浸灌浸灌勞力而功小以自比也其於澤潤也也不亦勞乎此自見其功不足居也夫子立而天下治言許由立地之間天下自治而我猶尸主也之吾自視然言有許由如此之聖人返隱而不出而我自愧如此猶居人君之位今乃自知然也請致天下然堯雖能讓天下則能忘己忘功尚未忘讓之之名如宋榮子之笑世也許由曰子治天下今子治天下天下既已治也天下既治則己又何求人哉而我猶代子吾將為名乎言天下已治乃堯之功也今讓與我是我無功而虛受人君之名也我豈為名之人乎名者實之賔也吾將為賔乎名自實有今我無實而有名是我全無實德而專尚名而處賔吾豈處賔不務實之人乎鷦鷯小鳥也巢於深林不過一枝偃鼠飲河不過滿腹此許由雖能忘名而未能忘己如鷦鷯之一枝偃鼠之滿腹皆取足一己之意正似列子御風而未能忘形若姑射神人則無不忘矣歸句此斥堯速歸也休乎句此止堯再不必來也君句此一字冷語意謂你只見得人君尊大也豫無所用天下為言我要天下作何用也庖人雖不治庖尸祝巫祝之人不離尊俎不越尊俎而代之矣此二句乃許由掉臂語謂堯不治天下如庖人不治庖只該尋要天下的人不可尋尸祝我非其人豈棄我之所守而往代之耶因前文以宋榮子一節有三等人以名忘己忘功忘名之人此一節即以堯讓天下雖能忘功而未忘讓之之名許由不受天下雖能忘名而取自足於己是未能忘己必若向下姑射之神人乃大而化之之神人兼忘之大聖以發明逍遙之實證也肩吾問於連叔曰吾聞言於接輿大而無當言大無實往而不返言只任語去而不反求果否也吾驚怖其言猶河漢而無極也大有徑二字皆去聲謂過當也不近人情焉肩吾信不及處信是小知小見也連叔曰其言謂何哉問所説何事也曰藐極遠也姑射山名之山有神人居焉肌膚若冰雪言肢體清榮也淖約美好也若處子謂顏色美好如室中女也不食五穀吸風飲露言以風露為食也乘雲氣御飛龍而遊乎四海之外言己超脫人世乘雲御龍而遨遊於六合之間也其神凝定也使物不疵癘言所至則能福民也而年穀熟言所經則和氣風雨及時也吾以是狂誑也而不信也我謂絶無此等人定是誑語故不信也連叔曰然然其不信處瞽者無以與乎文章之觀聾者無以與乎鍾鼓之音豈惟不但也形骸有聾盲哉夫知亦有之言肩吾之智若聾瞽無所知見故不信此説耳是其言也此聾瞽之言猶時是也女也聾盲之言即是女也之人也之德也此神人之妙用將磅礴萬物與萬物混而為一也以為一世蘄乎亂治也言此等人與造物同遊無心於出世則為一世之福而求乎以治孰弊弊汲汲勞悴心之貌焉以天下為事言此人豈肯汲汲勞心以治天下為事哉之人也言此人物莫之傷言已脫形骸無我與物對故物莫能傷即老子云以其無死地焉大浸大水也稽天稽至也言滔天之水而不溺大旱金石流流金爍石言熱之極也土山焦而不熱不溺不熱乃不能傷處是言此人其塵垢猶土苴也粃粳乃穀之粗皮非精實也將猶陶鑄堯舜者也言此人之德即土苴粃粳最粗者尚能做出堯舜之事業況其精神乎孰肻以物為事言此神人之德如此誰肻弊弊以物為事此一節釋上乘天地御六氣之至人神人聖人之德如此即下所稱大宗師者若此等人迫而應世必為聖帝明王無心御世無為而化其土苴緒餘以為天下國家決不肻似堯舜弊弊焉以治天下為事極言其無為而化世者必是此等人物也宋人資貨賣也章甫而適諸越宋人以章甫為貴重故往資之越人斷髮文身無所用之宋人自以章甫為貴而不知越人為無用也此喻堯以天下為貴特讓許由而不知由無用天下為大似越人斷髮文身以章甫為無用也堯治天下之民平海內之政往見四子即齧披衣王倪之類藐姑射之山汾水堯之都也之陽窅然茫然自失之貌喪其天下焉此一節釋上堯讓天下與許由許由不受意謂由雖不受堯之天下却不能使堯忘其天下且不能忘讓之之名以由未忘一己故也今一見神人則使堯頓喪天下此足見神人御世無為之大用一書立言之意盡在此一語不但為逍遙之結文而已也莊子文章觀者似乎縱橫洸洋自恣而其中屬意精密嚴整之不可當即逍遙一篇精意入神之如此逍遙之意已結所謂寓言重言而後文乃巵言也大似詼諧戲劇之意以發自己心事謂人以莊子所言大而無用但人不善用不知無用之用為大用故假惠子以發之惠子謂莊子曰魏王遺餽也我大瓠之種惠子魏人故言魏王我樹之成而實五石瓠之子有五石之多言其大如此以盛水漿其堅重也不能自舉言一人舉不動也剖之以為瓢則瓠落言廓落之大沒處安頓無所容非不呺然大貌大也吾為其無用而掊之言擊碎之也莊子曰夫子固拙於用大矣言惠子不能善用其大也宋人有善為不龜音均言寒凍手背皮皺裂如龜背之故也手之藥者言能治使手不皺裂之藥者世世以洴澼漂洗也絖舊綿絮也為事言因有不裂手之藥故世世以此為業客聞之請買其方百金客聞其方妙故重價買之聚族而謀之曰我世世為洴澼絖不過數金所獲之利薄今一朝而鬻技百金言雖一旦而得厚利且不損己請與之不知客所用大也客得之以説去聲吳王越有難吳王使之將使得方之人以為將冬與越水戰大敗越人言吳有此藥故士卒能兵越無之故敗也裂地剖土以封而封之言以此藥致封矦也能不龜手一也或以封或不免為洴澼絖則所用之異也莊子以此喻惠子不善用其無用也今子有五石之瓠何不慮思其可用處以為大樽以瓠為度水之樽如今之漁舟小兒背瓠可知也而浮於江湖此以所用之大也而憂其瓠落無所容則夫子猶有蓬之心蓬有心而不通此嘲惠子一竅不通正巵言也也夫此一節莊子以自創逍遙神人之説以明無用之大用蓋亦有自寓己意言世無所知也惠子乃莊子生平相契之友故托嘲調以見己意蓋亦言其雖有聖人必須舉世有見知者而後乃得見用於當世也言雖戲劇而心良苦矣此等文要得其趣則不可以正解別是一種風味所謂詩有別趣也後諸篇中似此寓意者多學者不可不知也前雖説不善用其大尚未説無用之用故下文以大樹發之惠子謂莊子曰吾有大樹人謂之樗樗散無用之木其大本樹大身也擁腫而不中繩墨言不材之甚其小枝卷曲而不中規矩言不可裁取也立之塗喻當要路匠石喻當世執政之人不顧喻不為世所采録也今子之言大而無用言雖大而無實用衆所同去言為衆人所共棄也也莊子曰子獨不見狸狌乎莊子因惠子説大而無用遂將狐狸野貓之小巧以比惠子并世用小知者皆不得其死卑身而伏以候敖者以比小知之人卑身諂求以取功利俟其機會如狸狌之伏身以候遨者東西跳梁不避高下以踰世人無知但知求利恣肆妄行不避利害中於機辟此機辟以取狸狌者死於罔𮊁以罔𮊁羅取狸狌因不避高下故墮死於機罔之中以喻世人之恃知求利名者亦若此而已今夫斄牛南方山中有此大牛其大若垂天之雲斄牛雖大未必如此乃巵言也此能為大矣不能執鼠言斄牛之大縱若垂天之雲能如此大亦不能執鼠言其至大不能就其屑小也今子有大樹患其無用言既有此大樹不必患其無用任他無用何不樹之於無何有之鄉此莊子自喻也然雖大而無用但你世人亦不必用但任放之於無用之地有何不可廣莫之野此句與無何有皆喻大道之鄉也倣徨遊衍自得也乎無為其側逍遙乎寢臥其下言至人無用而任與道遊則行住坐臥樂有餘地又何患焉不夭斤斧大樹本已不材而又樹之無人之境斧斤不傷以喻聖人無求於世故不為世所傷害也物無害者以無用且不置人前何害之有哉無所可用安所困苦哉此篇托惠子以嘲莊子之無用莊子因嘲惠子以小知求名求利之為害似狸狌之不免死於罔𮊁若至人無求於世固雖無用足以道自樂得以終其天年豈不為全生養道之大用是則無用又何困苦哉此雖巵言足見莊子心事自得之如此豈世之小知之人能知耶音釋鷽胡覺切音學小鳩也淖叶尺約切音綽柔弱之貌洴澼上旁經切音瓶下匹歷切音霹漂絮聲也絖苦謗切音曠絮也𣀗音離野牛也
